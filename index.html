<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>MeatballParm Draft Assistant</title>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#fdf6e8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MeatballParm">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Barlow+Semi+Condensed:ital,wght@0,600;0,700;1,600;1,700&family=Saira+Condensed:wght@600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Sacramento&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Pacifico&family=Fraunces:opsz,wght@9..144,600;9..144,900&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0a0e0a;
    --bg-panel: #11161a;
    --bg-elev: #1a2128;
    --bg-elev2: #222c35;
    --border: #2a3540;
    --border-bright: #3d4f5e;
    --text: #d4e0e8;
    --text-dim: #7a8a96;
    --text-muted: #4a5764;
    --accent: #00ff88;
    --accent-dim: #00cc6a;
    --accent-deep: #0c3322;
    --warn: #ffaa00;
    --danger: #ff3355;
    --info: #00bbff;

    --qb: #ff5577;
    --rb: #00d4a0;
    --wr: #5599ff;
    --te: #ffaa44;
    --k:  #aa88ff;
    --def: #bb7755;
    --idp: #66ccbb;

    --mono: ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace;
    --safe-t: env(safe-area-inset-top, 0px);
    --safe-b: env(safe-area-inset-bottom, 0px);
    --topbar-h: 52px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    overscroll-behavior: none;
    background: var(--bg); color: var(--text);
    font-family: var(--mono); font-size: 13px;
    -webkit-font-smoothing: antialiased; -webkit-text-size-adjust: 100%;
  }
  body { position: fixed; inset: 0; overflow: hidden; }
  button, input, select { font-family: inherit; font-size: inherit; color: inherit; }
  button { border: none; background: none; cursor: pointer; }
  ::-webkit-scrollbar { width: 0; height: 0; }

  .pos-QB  { color: var(--qb); }  .pos-RB { color: var(--rb); }
  .pos-WR  { color: var(--wr); }  .pos-TE { color: var(--te); }
  .pos-K   { color: var(--k); }   .pos-DEF { color: var(--def); }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .dot.QB{background:var(--qb)} .dot.RB{background:var(--rb)} .dot.WR{background:var(--wr)}
  .dot.TE{background:var(--te)} .dot.K{background:var(--k)} .dot.DEF{background:var(--def)}
  .dot.DL,.dot.LB,.dot.DB,.dot.IDP{background:var(--idp)}

  /* ============ TOP BAR ============ */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 40;
    padding-top: var(--safe-t);
    height: calc(var(--topbar-h) + var(--safe-t));
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    padding-left: 10px; padding-right: 10px;
  }
  .tb-btn {
    width: 38px; height: 38px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: var(--text-dim);
    border-radius: 8px; background: var(--bg-elev);
  }
  .tb-btn:active { background: var(--bg-elev2); }
  .tb-btn.gear { transition: transform 0.35s cubic-bezier(0.32,0.72,0,1), color 0.2s, background 0.15s; }
  .tb-btn.gear:hover { color: var(--text); }
  .tb-btn.gear:active { color: var(--accent); background: var(--accent-deep); transform: rotate(60deg); }
  .tb-btn.gear.spin { animation: gearspin 0.5s cubic-bezier(0.32,0.72,0,1); }
  @keyframes gearspin { from { transform: rotate(0deg); } to { transform: rotate(180deg); } }
  .nav-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 14px 2px; border-bottom: 1px solid var(--border); }
  .nav-row:active { background: var(--bg-panel); }
  .nav-row .nl { display: flex; align-items: center; gap: 12px; font-size: 15px; }
  .nav-row .nl .ic { width: 22px; text-align: center; color: var(--text-dim); font-size: 16px; }
  .nav-row .nl .nsub { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
  .nav-row .chev { color: var(--text-muted); font-size: 15px; }
  .reduce-motion * { transition: none !important; animation: none !important; }
  #tbCenter { flex: 1; min-width: 0; text-align: center; }
  .turn-pill {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--accent); color: #002417;
    font-weight: 800; letter-spacing: 0.04em; font-size: 12px;
    padding: 5px 13px; border-radius: 14px;
    box-shadow: 0 0 16px rgba(0,255,136,0.35);
  }
  .turn-pill.wait { background: var(--bg-elev); color: var(--text-dim); box-shadow: none; border: 1px solid var(--border); }
  .turn-pill.live { background: var(--accent-deep); color: var(--accent); box-shadow: none; border: 1px solid var(--accent-dim); }
  .turn-sub { display: block; font-size: 9px; color: var(--text-muted); letter-spacing: 0.06em; margin-top: 2px; }
  .turn-sub .clock { color: var(--warn); font-weight: 700; }

  /* ============ BOARD ============ */
  #boardArea {
    position: fixed; left: 0; right: 0;
    top: calc(var(--topbar-h) + var(--safe-t));
    height: var(--board-h, 40vh);
    background: var(--bg);
    overflow: auto; -webkit-overflow-scrolling: touch;
    transition: height 0.24s cubic-bezier(0.32,0.72,0,1);
    z-index: 10;
  }
  #boardArea.collapsed { height: 0; }
  #boardGrid { display: grid; gap: 3px; padding: 8px; min-width: max-content;
    grid-template-rows: 34px; grid-auto-rows: 58px; }
  .bcell {
    border-radius: 5px; padding: 4px 5px;
    font-size: 9px; overflow: hidden;
    display: flex; flex-direction: column; justify-content: center;
    width: 78px; height: 100%; min-height: 0;
    background: var(--bg-panel); border: 1px solid var(--border);
  }
  .bcell.rlabel {
    width: 24px; background: transparent; border: none;
    color: var(--text-muted); font-weight: 800; font-size: 10px;
    align-items: center; justify-content: center;
  }
  .bcell.head {
    height: 34px; background: var(--bg-elev);
    align-items: center; justify-content: center; text-align: center;
    gap: 3px; flex-direction: row;
  }
  .bcell.head .tlogo {
    width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0;
    background: var(--bg-elev2); display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 800; color: var(--text-muted);
  }
  .bcell.head .tname { font-weight: 800; font-size: 9px; color: var(--text-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.03em; }
  .bcell.head.you { background: var(--accent-deep); border-color: var(--accent-dim); }
  .bcell.head.you .tname { color: var(--accent); }
  .bcell.head.you .tlogo { background: var(--accent); color: #002417; }
  .bcell.slotcol { background: rgba(0,255,136,0.045); }
  .bcell.picked { border-color: var(--border-bright); }
  .bcell.picked .bpick { font-size: 8px; color: var(--text-muted); font-weight: 700; }
  .bcell.picked .bname { font-weight: 800; font-size: 10px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.15; }
  .bcell.picked .bmeta { font-size: 8px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bcell.mine { background: var(--accent-deep); border-color: var(--accent-dim); }
  .bcell.keeper { border-color: var(--warn); }
  .bcell.empty .bpn { font-size: 9px; color: var(--text-muted); font-weight: 700; }
  .bcell.empty .barrow { font-size: 9px; color: var(--text-muted); opacity: 0.5; }
  .bcell.onclock {
    background: rgba(255,170,0,0.09); border-color: var(--warn);
    animation: pulse 1.3s ease-in-out infinite;
  }
  .bcell.onclock .oc { font-size: 8px; font-weight: 800; color: var(--warn); letter-spacing: 0.06em; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,170,0,0.45); } 50% { box-shadow: 0 0 0 4px rgba(255,170,0,0); } }

  /* ============ PANEL ============ */
  #panel {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
    top: calc(var(--topbar-h) + var(--safe-t) + var(--board-h, 40vh));
    background: var(--bg-panel);
    border-top: 1px solid var(--border-bright);
    border-radius: 16px 16px 0 0;
    display: flex; flex-direction: column;
    transition: top 0.24s cubic-bezier(0.32,0.72,0,1);
    box-shadow: 0 -6px 24px rgba(0,0,0,0.4);
  }
  #boardArea.collapsed ~ #panel { top: calc(var(--topbar-h) + var(--safe-t)); }
  .panel-grab { padding: 7px 0 4px; display: flex; justify-content: center; }
  .panel-grab i { width: 38px; height: 4px; border-radius: 2px; background: var(--border-bright); }
  .panel-tabs { display: flex; padding: 0 6px; border-bottom: 1px solid var(--border); }
  .ptab {
    flex: 1; padding: 11px 4px 12px; text-align: center;
    font-size: 11px; font-weight: 800; letter-spacing: 0.1em;
    color: var(--text-muted); position: relative;
  }
  .ptab.on { color: var(--accent); }
  .ptab.on::after {
    content: ''; position: absolute; left: 50%; bottom: -1px; transform: translateX(-50%);
    width: 30px; height: 2px; background: var(--accent); border-radius: 1px;
  }
  .ptab .cnt {
    display: inline-block; margin-left: 4px; font-size: 9px;
    background: var(--bg-elev); color: var(--text-dim); border-radius: 8px; padding: 1px 5px;
  }
  .panel-body { flex: 1; overflow: auto; -webkit-overflow-scrolling: touch; padding-bottom: var(--safe-b); }
  .pview { display: none; }
  .pview.on { display: block; }

  /* ---- players controls ---- */
  #playersCtrl {
    position: sticky; top: 0; z-index: 5;
    background: var(--bg-panel); padding: 9px 10px 7px;
    border-bottom: 1px solid var(--border);
  }
  .filt-row { display: flex; gap: 7px; align-items: center; }
  .filt-search {
    width: 40px; height: 40px; flex-shrink: 0; border-radius: 50%;
    background: var(--bg-elev); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; font-size: 15px; color: var(--text-dim);
  }
  .filt-search.on { border-color: var(--accent); color: var(--accent); }
  .filt-scroll { display: flex; gap: 7px; overflow-x: auto; flex: 1; }
  .filt {
    flex-shrink: 0; min-width: 46px; height: 40px; padding: 0 6px;
    border-radius: 12px; border: 1px solid var(--border); background: var(--bg-elev);
    display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1.05;
  }
  .filt .fp { font-size: 11px; font-weight: 800; letter-spacing: 0.04em; color: var(--text-dim); }
  .filt .fc { font-size: 8px; color: var(--text-muted); margin-top: 1px; }
  .filt.on { background: var(--text); border-color: var(--text); }
  .filt.on .fp, .filt.on .fc { color: #000; }
  .filt.on[data-f="QB"]{background:var(--qb);border-color:var(--qb)}
  .filt.on[data-f="RB"]{background:var(--rb);border-color:var(--rb)}
  .filt.on[data-f="WR"]{background:var(--wr);border-color:var(--wr)}
  .filt.on[data-f="TE"]{background:var(--te);border-color:var(--te)}
  .filt.on[data-f="K"]{background:var(--k);border-color:var(--k)}
  .filt.on[data-f="DEF"]{background:var(--def);border-color:var(--def)}
  #searchWrap { display: none; margin-top: 8px; }
  #searchWrap.on { display: block; }
  #searchInput {
    width: 100%; background: var(--bg-elev); border: 1px solid var(--accent);
    border-radius: 8px; padding: 10px 12px; font-size: 15px; color: var(--text);
  }
  #searchInput:focus { outline: none; }
  .sortbar { display: flex; align-items: center; gap: 6px; margin-top: 7px; }
  .sortbar .lbl { font-size: 9px; color: var(--text-muted); letter-spacing: 0.08em; }
  .seg { display: flex; border: 1px solid var(--border); border-radius: 7px; overflow: hidden; }
  .seg button { padding: 6px 11px; font-size: 10px; font-weight: 800; letter-spacing: 0.05em; background: var(--bg-elev); color: var(--text-muted); }
  .seg button.on { background: var(--accent); color: #000; }

  /* ---- player rows ---- */
  .prow {
    display: flex; align-items: center; gap: 9px;
    padding: 9px 11px; border-bottom: 1px solid var(--border);
    content-visibility: auto; contain-intrinsic-size: 0 60px;
  }
  .prow:active { background: var(--bg-elev); }
  .prow .draftbtn {
    flex-shrink: 0; width: 62px; padding: 9px 0; border-radius: 16px;
    background: var(--accent); color: #002417;
    font-size: 10px; font-weight: 800; letter-spacing: 0.06em; text-align: center;
  }
  .prow .draftbtn:active { background: var(--accent-dim); }
  .prow .draftbtn.off { background: var(--bg-elev); color: var(--text-muted); box-shadow: none; }
  .prow .prank { flex-shrink: 0; width: 20px; text-align: center; font-size: 11px; font-weight: 700; color: var(--text-muted); }
  .prow .pinfo { flex: 1; min-width: 0; }
  .prow .pn { font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; }
  .prow .pmeta { display: flex; align-items: center; gap: 6px; margin-top: 2px; font-size: 10px; color: var(--text-dim); }
  .prow .pmeta .injx { font-weight: 800; }
  .prow .qbtn {
    flex-shrink: 0; width: 34px; height: 34px; border-radius: 8px;
    background: var(--bg-elev); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; font-size: 15px; color: var(--text-muted);
  }
  .prow .qbtn.on { color: var(--accent); border-color: var(--accent-dim); background: var(--accent-deep); }
  .prow .qnum { position: absolute; font-size: 8px; font-weight: 800; transform: translate(11px,-11px); color: var(--accent); }
  .prow .stat2 { flex-shrink: 0; display: flex; gap: 12px; text-align: center; }
  .prow .stat2 .s { min-width: 34px; }
  .prow .stat2 .sl { font-size: 8px; color: var(--text-muted); letter-spacing: 0.06em; }
  .prow .stat2 .sv { font-size: 12px; font-weight: 700; color: var(--text); }
  .prow.dnd { opacity: 0.4; }
  .proj-div {
    display: flex; align-items: center; gap: 8px; padding: 5px 11px;
    background: var(--accent-deep); border-top: 1px solid var(--accent-dim); border-bottom: 1px solid var(--accent-dim);
  }
  .proj-div .line { flex: 1; height: 1px; background: var(--accent-dim); opacity: 0.5; }
  .proj-div span { font-size: 9px; font-weight: 800; letter-spacing: 0.1em; color: var(--accent); }
  .tierbreak { padding: 5px 11px; font-size: 9px; font-weight: 800; letter-spacing: 0.14em; color: var(--text-muted); background: var(--bg-elev); border-bottom: 1px solid var(--border); }

  .empty { padding: 44px 22px; text-align: center; color: var(--text-muted); font-size: 12px; line-height: 1.7; }

  /* ---- queue ---- */
  .qrow { display: flex; align-items: center; gap: 10px; padding: 10px 11px; border-bottom: 1px solid var(--border); }
  .qrow .qidx { width: 22px; text-align: center; font-size: 13px; font-weight: 800; color: var(--accent); }
  .qrow .qinfo { flex: 1; min-width: 0; }
  .qrow .qmove { display: flex; flex-direction: column; gap: 2px; }
  .qrow .qmove button { width: 30px; height: 22px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 5px; font-size: 11px; color: var(--text-dim); }
  .qrow .qrm { width: 34px; height: 34px; border-radius: 8px; background: var(--bg-elev); color: var(--danger); font-size: 14px; display: flex; align-items: center; justify-content: center; }

  /* ---- team/roster ---- */
  .rgrp-h { display: flex; justify-content: space-between; padding: 10px 12px 5px; font-size: 9px; font-weight: 800; letter-spacing: 0.14em; color: var(--text-muted); text-transform: uppercase; }
  .rslot { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-bottom: 1px solid var(--border); }
  .rslot .rk { flex-shrink: 0; width: 44px; font-size: 9px; font-weight: 800; letter-spacing: 0.06em; color: var(--text-muted); }
  .rslot .rw { flex: 1; min-width: 0; }
  .rslot .rw .rn { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rslot .rw .rs { font-size: 10px; color: var(--text-dim); margin-top: 1px; }
  .rslot.filled { background: var(--bg-panel); }
  .rslot.empt .rn { color: var(--text-muted); font-style: italic; font-weight: 400; }

  /* ============ FULLSCREEN SUBVIEWS (settings / saved) ============ */
  .screen {
    position: fixed; inset: 0; z-index: 60; background: var(--bg);
    display: none; flex-direction: column;
    padding-top: var(--safe-t);
  }
  .screen.on { display: flex; }
  .screen-top {
    height: var(--topbar-h); flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px; border-bottom: 1px solid var(--border); background: var(--bg-panel);
  }
  .screen-top .st-title { font-size: 17px; font-weight: 800; }
  .screen-top .st-x { font-size: 22px; color: var(--text-dim); width: 40px; height: 40px; display: flex; align-items: center; }
  .screen-top .st-save { font-size: 13px; font-weight: 800; letter-spacing: 0.08em; color: var(--accent); }
  .screen-body { flex: 1; overflow: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(24px + var(--safe-b)); }

  .sgroup { padding: 16px 16px 4px; }
  .sgroup-h { display: flex; align-items: center; gap: 7px; font-size: 11px; font-weight: 800; letter-spacing: 0.1em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; }
  .sgroup-h .ic { color: var(--text-muted); }
  .sgroup-sub { font-size: 11px; color: var(--text-muted); line-height: 1.5; margin: -6px 0 12px; }

  .field-in { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border-bright); padding: 8px 2px; font-size: 17px; color: var(--text); }
  .field-in:focus { outline: none; border-color: var(--accent); }

  .pill-row { display: flex; gap: 9px; }
  .pill-opt { flex: 1; padding: 12px 6px; border-radius: 22px; border: 1px solid var(--border-bright); background: var(--bg-panel); text-align: center; }
  .pill-opt .po1 { font-size: 13px; font-weight: 800; letter-spacing: 0.04em; }
  .pill-opt .po2 { font-size: 9px; color: var(--text-muted); margin-top: 2px; }
  .pill-opt.on { border-color: var(--accent); background: var(--accent-deep); }
  .pill-opt.on .po1 { color: var(--accent); }
  .pill-opt.dis { opacity: 0.4; }

  .toggle-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 4px 0; }
  .toggle-row .tr-txt { flex: 1; }
  .toggle-row .tr-t { font-size: 13px; font-weight: 700; }
  .toggle-row .tr-s { font-size: 11px; color: var(--text-muted); line-height: 1.5; margin-top: 3px; }
  .switch { flex-shrink: 0; width: 52px; height: 30px; border-radius: 15px; background: var(--bg-elev2); border: 1px solid var(--border-bright); position: relative; transition: background 0.15s; }
  .switch i { position: absolute; top: 2px; left: 2px; width: 24px; height: 24px; border-radius: 50%; background: #fff; transition: left 0.15s; }
  .switch.on { background: var(--accent-dim); border-color: var(--accent); }
  .switch.on i { left: 24px; }

  .radio-row { display: flex; align-items: center; gap: 12px; padding: 12px 2px; border-bottom: 1px solid var(--border); }
  .radio-row .rc { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--accent-dim); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .radio-row.on .rc { background: var(--accent); border-color: var(--accent); }
  .radio-row.on .rc::after { content: '✓'; color: #002417; font-size: 13px; font-weight: 900; }
  .radio-row .rt { font-size: 15px; }
  .radio-row.dis { opacity: 0.4; }

  .circ-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .circ { width: 54px; height: 54px; border-radius: 50%; border: 1px solid var(--border-bright); background: var(--bg-panel); display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .circ .c1 { font-size: 15px; font-weight: 800; }

  .stepper button { width: 38px; height: 34px; font-size: 18px; font-weight: 700; color: var(--accent); display: flex; align-items: center; justify-content: center; }
  .stepper button.minus { color: var(--text-dim); }

  .stepper .sv { min-width: 30px; text-align: center; font-size: 15px; font-weight: 800; }
  .rounds-note { font-size: 12px; color: var(--accent); font-weight: 700; padding: 12px 2px 0; }

  .order-row { display: flex; align-items: center; gap: 12px; padding: 11px 2px; border-bottom: 1px solid var(--border); }
  .order-row .oidx { width: 22px; text-align: center; font-size: 14px; font-weight: 800; color: var(--text-dim); }
  .order-row .olog { width: 38px; height: 38px; border-radius: 50%; background: var(--bg-elev2); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; color: var(--text-muted); flex-shrink: 0; }
  .order-row.you .olog { background: var(--accent); color: #002417; }
  .order-row .oinfo { flex: 1; min-width: 0; }
  .order-row .onm { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .order-row .osub { font-size: 10px; color: var(--text-muted); }
  .order-row .oyou { font-size: 9px; font-weight: 800; color: var(--accent); letter-spacing: 0.08em; }
  .order-row .omove { display: flex; gap: 3px; }

  .btn { display: block; width: 100%; padding: 14px; border-radius: 10px; background: var(--bg-elev); border: 1px solid var(--border-bright); color: var(--text); font-size: 12px; font-weight: 800; letter-spacing: 0.08em; margin-top: 10px; }
  .btn:active { background: var(--bg-elev2); }
  .btn.primary { background: var(--accent); color: #002417; border-color: var(--accent); }
  .btn.ghost-acc { background: transparent; border-color: var(--accent-dim); color: var(--accent); }
  .btn.danger { color: var(--danger); border-color: rgba(255,51,85,0.4); }

  /* ---- saved drafts ---- */
  .save-card { margin: 10px 14px; padding: 13px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 10px; }
  .save-card .sc-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .save-card .sc-nm { font-size: 15px; font-weight: 800; }

  .save-card .sc-badge.prog { background: rgba(255,170,0,0.15); color: var(--warn); }

  .save-card .sc-acts button { flex: 1; min-width: 62px; padding: 9px 4px; border-radius: 7px; background: var(--bg-elev); border: 1px solid var(--border); font-size: 10px; font-weight: 700; letter-spacing: 0.04em; color: var(--text-dim); }
  .save-card .sc-acts button.go { background: var(--accent); color: #002417; border-color: var(--accent); }
  .save-card .sc-acts button.del { color: var(--danger); }

  /* ============ START OVERLAY (pre-draft) ============ */
  #startOverlay {
    position: absolute; inset: 0; z-index: 6;
    background: linear-gradient(180deg, rgba(10,14,10,0.4), rgba(10,14,10,0.92));
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    padding: 20px;
  }
  #startOverlay.hidden { display: none; }

  #startOverlay .so-btn.mock { background: var(--accent); color: #002417; box-shadow: 0 0 22px rgba(0,255,136,0.35); }

  #sheetBack { position: fixed; inset: 0; z-index: 70; background: rgba(0,0,0,0.6); display: none; }

    border-radius: 16px 16px 0 0; padding: 8px 16px calc(18px + var(--safe-b));

  #sheet .sh-title { font-size: 17px; font-weight: 800; }

  .sh-act { display: flex; align-items: center; gap: 11px; width: 100%; padding: 14px 13px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 9px; margin-bottom: 7px; font-size: 14px; font-weight: 700; text-align: left; }

  .sh-act.del { color: var(--danger); }
  .sh-field { width: 100%; background: var(--bg-elev); border: 1px solid var(--border-bright); border-radius: 9px; padding: 13px; font-size: 16px; color: var(--text); margin-bottom: 10px; }
  .sh-field:focus { outline: none; border-color: var(--accent); }

  /* ============ TOAST ============ */
  #toast {
    position: fixed; top: calc(var(--safe-t) + var(--topbar-h) + 31px); left: 12px; right: 12px; z-index: 38;
    background: var(--bg-elev); border: 1px solid var(--border-bright); border-left: 3px solid var(--info);

  }
  #toast.show { opacity: 1; visibility: visible; transform: translateY(0); }
  #toast.success { border-left-color: var(--accent); }
  #toast.warn { border-left-color: var(--warn); }
  #toast.danger { border-left-color: var(--danger); }

  /* ============================================================

  :root{

  .turn-pill>*{ display:inline-block; transform:skewX(8deg); }

  .turn-pill.live{ background:var(--accent); color:#fff; border:none; animation:gdflash 1.15s ease-in-out infinite; }

  #boardArea{ top:calc(var(--topbar-h) + var(--safe-t) + 23px); }

  .bcell.head.you{ background:var(--accent); }
  .bcell.head.you .tname{ color:#fff; }
  .bcell.head.you .tlogo{ background:var(--warn); color:#241a00; }

  /* ---- player rows = lower-thirds ---- */

  .proj-div{ background:linear-gradient(90deg, rgba(255,210,30,.14), transparent); border-color:var(--warn); }

  .rslot .rn{ font-family:var(--gname); font-style:italic; font-weight:700; font-size:14px; }
  .rslot .rk{ font-family:var(--ghead); letter-spacing:.06em; }
  .qrow .qidx{ color:var(--warn); font-family:var(--ghead); }
  .qrow .pn{ font-family:var(--gname); font-style:italic; }

  /* ---- buttons / sheets / screens ---- */
  .btn{ font-family:var(--ghead); letter-spacing:.1em; border-radius:3px; }
  .btn.primary{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .btn.ghost-acc{ color:var(--warn); border-color:var(--warn); }

  .pill-opt.on{ border-color:var(--warn); background:rgba(255,210,30,.10); } .pill-opt.on .po1{ color:var(--warn); }
  .circ.on{ border-color:var(--warn); background:rgba(255,210,30,.10); } .circ.on .c1{ color:var(--warn); }

  #toast{ border-left-width:4px; }

  /* ---- start overlay ---- */
  #startOverlay .so-title{ font-family:var(--ghead); letter-spacing:.2em; color:var(--warn); }
  #startOverlay .so-btn{ font-family:var(--ghead); letter-spacing:.1em; border-radius:4px; }
  #startOverlay .so-btn.mock{ background:var(--accent); color:#fff; box-shadow:0 0 24px -6px rgba(232,17,45,.6); }

  #ticker{ position:fixed; left:0; right:0; top:calc(var(--topbar-h) + var(--safe-t)); height:23px; z-index:39;

  .prow .draftbtn.off{ background:#efe4cf; color:var(--text-muted); box-shadow:none; }
  .prow .qbtn{ background:#fffaf0; border-color:var(--border); }
  .prow .qbtn.on{ color:var(--accent); border-color:#edb9ac; background:var(--accent-deep); }
  .proj-div{ background:linear-gradient(90deg, rgba(217,151,31,.18), transparent); border-color:#e6c789; }
  .proj-div span{ color:#a5701a; font-family:var(--ghead); letter-spacing:.1em; }
  .proj-div .line{ background:#e6c789; }
  .tierbreak{ color:var(--accent); background:#f6ecd6; font-family:var(--ghead); letter-spacing:.1em; }

  /* roster + queue */
  .rgrp-h{ font-family:var(--ghead); letter-spacing:.1em; } .rgrp-h .cnt{ color:var(--accent); }
  .rslot.filled{ background:#fffaf0; }
  .rslot .rn{ font-family:var(--gname); color:var(--text); } .rslot .rk{ font-family:var(--ghead); letter-spacing:.05em; }
  .qrow .qidx{ color:var(--accent); } .qrow .pn{ font-family:var(--gname); color:var(--text); }

  /* buttons / sheets / screens */
  .btn{ font-family:var(--ghead); letter-spacing:.08em; }
  .btn.primary{ background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 5px 14px -8px rgba(193,41,15,.6); }
  .btn.ghost-acc{ color:var(--accent); border-color:#edb9ac; }
  .pill-opt.on{ border-color:var(--accent); background:var(--accent-deep); } .pill-opt.on .po1{ color:var(--accent-dim); }
  .circ.on{ border-color:var(--accent); background:var(--accent-deep); } .circ.on .c1{ color:var(--accent-dim); }
  .stepper button{ color:var(--accent); }
  .switch.on{ background:var(--basil); border-color:var(--basil); }
  .radio-row.on .rc{ background:var(--accent); border-color:var(--accent); } .radio-row.on .rc::after{ color:#fff; }
  .sgroup-h{ font-family:var(--ghead); letter-spacing:.1em; }
  .screen{ background:var(--bg); }
  .screen-top{ background:#fffaf0; border-bottom:2px solid var(--accent); }
  .st-title{ font-family:'Pacifico',cursive; color:var(--accent); font-style:normal; letter-spacing:0; }
  .st-save{ color:var(--accent); font-family:var(--ghead); letter-spacing:.06em; }
  .nav-row .nl{ font-family:var(--gname); color:var(--text); }
  .field-in{ color:var(--text); border-bottom-color:var(--border-bright); }
  .sh-title{ font-family:var(--ghead); color:var(--text); letter-spacing:.04em; }
  #sheet{ background:#fffaf0; border-top:2px solid var(--accent); }
  #sheetBack{ background:rgba(58,36,22,.4); }
  .sh-act{ background:#fffaf0; border-color:var(--border); color:var(--text); } .sh-act.go{ background:var(--accent); color:#fff; }
  .sh-field{ background:#fffaf0; border-color:var(--border); color:var(--text); }
  #toast{ background:#fffaf0; border:1px solid var(--border); box-shadow:0 12px 30px -14px rgba(90,50,20,.4); color:var(--text); }
  #toast.success{ border-left-color:var(--basil); }
  .save-card{ background:#fffaf0; border-color:var(--border); }
  .save-card .sc-nm{ font-family:var(--gname); color:var(--text); }
  .save-card .sc-badge.done{ background:var(--accent-deep); color:var(--accent-dim); }
  .save-card .sc-acts button{ background:#fffaf0; } .save-card .sc-acts button.go{ background:var(--accent); color:#fff; border-color:var(--accent); }

  /* start overlay */
  #startOverlay{ background:linear-gradient(180deg, rgba(253,247,234,.25), rgba(244,233,210,.92)); }
  #startOverlay .so-title{ color:var(--accent); text-shadow:none; font-family:'Pacifico',cursive; letter-spacing:0; text-transform:none; font-size:16px; }
  #startOverlay .so-btn{ font-family:var(--ghead); letter-spacing:.08em; }
  #startOverlay .so-btn.mock{ background:var(--accent); color:#fff; box-shadow:0 8px 22px -9px rgba(193,41,15,.6); }
  #startOverlay .so-btn.sleeper, #startOverlay .so-btn.saved{ background:#fffaf0; border:1px solid var(--border); color:var(--text); }

  #startOverlay{ position:fixed; top:calc(var(--topbar-h) + var(--safe-t)); left:0; right:0; bottom:0; z-index:39;
    background:linear-gradient(180deg,#fdf7ea,#f6ecd7); display:flex; flex-direction:column; align-items:center;
    justify-content:space-between; gap:0; padding:0; }
  #startOverlay.hidden{ display:none; }
  #startOverlay .so-hero{ flex:1 1 auto; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:9px; padding:24px 28px; width:100%; }
  #startOverlay .so-logo{ width:90px; height:62px; background:var(--so-logo) center/contain no-repeat; filter:drop-shadow(0 10px 18px rgba(120,40,10,.22)); }
  #startOverlay .so-wm{ font-family:'Pacifico',cursive; font-size:46px; line-height:1; color:var(--accent); }
  #startOverlay .so-rule{ width:64px; height:2px; background:var(--parm); border-radius:2px; margin:5px 0 3px; opacity:.9; }
  #startOverlay .so-tag{ font-family:'Bebas Neue',sans-serif; letter-spacing:.18em; text-transform:uppercase; font-size:13px; color:var(--text-muted); }
  #startOverlay .so-actions{ flex:0 0 auto; display:flex; flex-direction:column; gap:12px; width:100%; max-width:380px; padding:0 26px 10px; }
  #startOverlay .so-btn{ width:100%; max-width:none; display:flex; align-items:center; justify-content:center; gap:10px; height:56px; padding:0 18px; border-radius:16px; font-family:'Bebas Neue',sans-serif; letter-spacing:.06em; font-weight:400; font-size:17px; text-align:center; }
  #startOverlay .so-btn .bi{ font-size:14px; }
  #startOverlay .so-btn.mock{ background:var(--accent); color:#fff; border:none; box-shadow:0 14px 28px -12px rgba(193,41,15,.55); text-shadow:none; }
  #startOverlay .so-btn.sleeper{ background:#fffaf0; border:1px solid var(--border-bright); color:var(--text); box-shadow:0 6px 16px -13px rgba(90,50,20,.5); text-shadow:none; }
  #startOverlay .so-btn.saved{ background:#fffaf0; border:1px solid var(--border); color:var(--text-dim); box-shadow:0 6px 16px -13px rgba(90,50,20,.5); }
  #startOverlay .so-btn.settings{ background:#fffaf0; border:1px solid var(--border); color:var(--text-dim); box-shadow:0 6px 16px -13px rgba(90,50,20,.5); }
  #startOverlay .so-foot{ flex:0 0 auto; font-family:var(--mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-muted); padding:0 20px calc(20px + var(--safe-b)); }
  body.predraft #tbCenter{ visibility:hidden; }
  /* Settings now lives as a full button below Saved Drafts — hide the duplicate top gear on the opening screen (it returns during the live draft) */
  body.predraft #gearBtn{ display:none; }
  /* Opening-screen button micro-interactions — match the app's easing/press language */
  #startOverlay .so-btn{ -webkit-tap-highlight-color:transparent; user-select:none; will-change:transform; transition:transform .18s cubic-bezier(.32,.72,0,1), box-shadow .24s cubic-bezier(.32,.72,0,1), background .15s ease, border-color .15s ease, filter .15s ease; }
  @media (hover:hover){
    #startOverlay .so-btn:hover{ transform:translateY(-1.5px); }
    #startOverlay .so-btn.mock:hover{ box-shadow:0 18px 34px -12px rgba(193,41,15,.62); }
    #startOverlay .so-btn.sleeper:hover, #startOverlay .so-btn.saved:hover, #startOverlay .so-btn.settings:hover{ border-color:var(--border-bright); box-shadow:0 11px 22px -13px rgba(90,50,20,.6); }
  }
  #startOverlay .so-btn:active{ transform:translateY(1px) scale(.986); transition-duration:.05s; }

  #startOverlay .so-btn.sleeper:active, #startOverlay .so-btn.saved:active, #startOverlay .so-btn.settings:active{ background:#f6ecd6; box-shadow:0 3px 10px -10px rgba(90,50,20,.5); }
  /* ===== Player peek profile — tap any name → profile sheet (Concept 2) ===== */
  .prow .pinfo .pn, .qrow .qinfo .pn, .rslot.filled .rn{ color:var(--accent); }
  .prow .pinfo, .qrow .qinfo, .rslot.filled.tapname, .bcell.picked{ cursor:pointer; }
  .prow .pinfo:active .pn, .qrow .qinfo:active .pn{ opacity:.6; }
  .rslot.filled.tapname:active{ background:var(--bg-elev2); }
  #sheet .grab{ position:relative; touch-action:none; }
  #sheet .grab::before{ content:''; position:absolute; inset:-14px -50px; }
  .pp-head{ display:flex; align-items:center; gap:12px; margin:2px 0 12px; }
  .pp-av{ width:52px; height:52px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    font-family:var(--ghead,inherit); font-weight:800; font-size:19px; letter-spacing:.02em; color:var(--accent);
    background:var(--accent-deep); border:1px solid var(--accent-dim); }
  .pp-id{ flex:1; min-width:0; }
  .pp-name{ font-size:22px; font-weight:800; line-height:1.05; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pp-sub{ display:flex; align-items:center; gap:6px; margin-top:5px; font-size:11px; color:var(--text-dim); }
  .pp-tier{ margin-left:auto; align-self:flex-start; flex-shrink:0; font-size:10px; font-weight:800; letter-spacing:.03em;
    color:#fff; background:#3f8f3a; border-radius:8px; padding:4px 9px; }
  .pp-inj{ display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:800; color:var(--warn);
    background:var(--accent-deep); border:1px solid var(--border); border-radius:9px; padding:5px 10px; margin:0 0 12px; }
  .pp-tiles{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:0 0 14px; }
  .pp-tile{ background:var(--bg-elev); border:1px solid var(--border); border-radius:12px; padding:9px 4px 8px; text-align:center; }
  .pp-tile b{ display:block; font-size:8.5px; font-weight:700; letter-spacing:.06em; color:var(--text-muted); margin-bottom:3px; }
  .pp-tile span{ font-size:20px; font-weight:800; color:var(--text); }
  /* ===== Player Database overlay — the real DB profile, embedded ===== */
  #dbOverlay{ position:fixed; inset:0; z-index:95; display:none; }
  #dbOverlay.on{ display:block; }
  #dbBack{ position:absolute; inset:0; background:rgba(58,36,22,.55); opacity:0; transition:opacity .28s cubic-bezier(.32,.72,0,1); }
  #dbOverlay.on #dbBack{ opacity:1; }
  #dbCard{ position:absolute; left:0; right:0; bottom:0; top:calc(var(--safe-t) + 24px);
    background:var(--bg); border-radius:20px 20px 0 0; overflow:hidden; display:flex; flex-direction:column;
    transform:translateY(100%); transition:transform .34s cubic-bezier(.32,.72,0,1);
    box-shadow:0 -18px 40px -20px rgba(40,22,10,.6); }
  #dbOverlay.on #dbCard{ transform:translateY(0); }
  #dbHead{ flex:0 0 auto; padding:8px 12px 10px; border-bottom:1px solid var(--border); background:var(--bg-panel); }
  #dbGrab{ width:38px; height:4px; border-radius:2px; background:var(--border-bright); margin:0 auto 9px; position:relative; touch-action:none; }

  #dbHeadRow{ display:flex; align-items:center; gap:10px; }
  #dbTitle{ flex:1; min-width:0; font-size:15px; font-weight:800; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #dbTitle small{ display:block; font-size:9px; font-weight:700; color:var(--text-muted); letter-spacing:.12em; text-transform:uppercase; margin-bottom:1px; }
  .db-x{ flex:0 0 auto; width:34px; height:34px; border-radius:10px; background:var(--bg-elev); border:1px solid var(--border); color:var(--text-dim); font-size:15px; }
  #dbFrame{ flex:1 1 auto; width:100%; border:0; background:var(--bg); }
  #dbMsg{ flex:1 1 auto; display:none; align-items:center; justify-content:center; text-align:center; padding:26px; color:var(--text-dim); font-size:13px; line-height:1.7; }
  #dbActs{ flex:0 0 auto; display:flex; gap:8px; padding:9px 12px calc(9px + var(--safe-b)); border-top:1px solid var(--border); background:var(--bg-panel); }
  #dbActs button{ flex:1; padding:12px 6px; border-radius:11px; font-size:12px; font-weight:800; letter-spacing:.04em;
    background:var(--bg-elev); border:1px solid var(--border); color:var(--text); }
  #dbActs button.go{ background:var(--accent); border-color:var(--accent); color:#fff; }

  .bcell.empty .bpn{ font-size:13px; color:var(--text-dim); font-weight:800; letter-spacing:.01em; }

function escapeHtml(s) {

    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function clamp(n, lo, hi) { return Math.max(lo, Math.min(hi, n)); }

// ---- derived config -------------------------------------------
function S() { return state.settings; }
function totalRounds() {
  const r = S().roster;
  return Object.keys(r).reduce((sum, k) => sum + (r[k] || 0), 0);

function rosterLabel() {

  const parts = [];
  STARTER_ORDER.forEach(k => { if (r[k] > 0) parts.push(r[k] + ' ' + POS_CATALOG[k].short); });
  return 'Rds. ' + totalRounds() + ' — ' + parts.join(', ') + (r.BN ? ', ' + r.BN + ' BN' : '');
}

// ensure order array is length == teams, your slot flagged
function normalizeOrder() {
  const s = S();
  if (!Array.isArray(s.order)) s.order = [];
  // trim / grow
  s.order = s.order.slice(0, s.teams);
  for (let i = s.order.length; i < s.teams; i++) {
    s.order.push({ id: 't' + (i + 1), name: 'Team ' + (i + 1), you: false });
  }
  s.yourSlot = clamp(s.yourSlot, 1, s.teams);
  s.order.forEach((t, i) => { t.you = (i + 1) === s.yourSlot; });
}
function teamAtSlot(slot) {
  normalizeOrder();
  return S().order[slot - 1] || { name: 'Team ' + slot, you: slot === S().yourSlot };
}
function teamLabel(slot) {
  const t = teamAtSlot(slot);
  if (t.you) return t.name && t.name !== ('Team ' + slot) ? t.name : 'YOU';
  return t.name || ('Team ' + slot);
}

function activePool() {
  if (S().scoring === 'ppr') return POOL_PPR;
  if (S().scoring === 'standard') return POOL_STD;
  return POOL_HALF;
}
function scoringLabel(k) { return k === 'ppr' ? 'Full PPR' : k === 'standard' ? 'Standard' : 'Half PPR'; }

function initPlayers() {
  const pool = activePool();
  const teams = S().teams;
  const arr = pool.map((p, i) => ({
    id: 'p_' + i, name: p[0], pos: p[1], team: p[2], bye: p[3],
    adp: p[4], tier: p[5], projPts: p[6],
    drafted: false, draftedBy: null, draftedAt: null, injuryStatus: null
  }));
  // replacement level scales with league size
  const repl = {};
  ['QB','RB','WR','TE','K','DEF'].forEach(pos => {
    const sorted = arr.filter(p => p.pos === pos).sort((a,b) => b.projPts - a.projPts);
    let idx;
    if (pos === 'RB' || pos === 'WR') idx = Math.round(teams * 2.5);
    else idx = teams;
    repl[pos] = sorted[Math.min(idx, sorted.length - 1)]?.projPts || 0;
  });
  arr.forEach(p => { p.vbd = p.projPts - (repl[p.pos] || 0); });
  return arr;
}

// ---- snake / linear math --------------------------------------
function pickToSlot(pickNo) {
  const teams = S().teams;
  const round = Math.ceil(pickNo / teams);
  const within = ((pickNo - 1) % teams) + 1;
  let slot;
  if (S().draftType === 'linear') {
    slot = within;
  } else {
    let reverse = (round % 2 === 0);
    if (S().thirdRoundReversal && round >= 3) reverse = !reverse; // flip snake from R3
    slot = reverse ? (teams - within + 1) : within;
  }
  return { round, slot };
}
function slotPicksInRound(slot, round) {
  const teams = S().teams;
  const base = (round - 1) * teams;
  if (S().draftType === 'linear') return base + slot;
  let reverse = (round % 2 === 0);
  if (S().thirdRoundReversal && round >= 3) reverse = !reverse;
  return reverse ? base + (teams - slot + 1) : base + slot;
}
// Pick labels: round . draft-slot (e.g. 2.03)
function pickLabel(round, slot) { return round + '.' + String(slot).padStart(2, '0'); }
function pickLabelNo(pickNo) { const ps = pickToSlot(pickNo); return ps.round + '.' + String(ps.slot).padStart(2, '0'); }
function nextOpenPickNo() {
  const taken = new Set(state.picks.map(pk => pk.pickNo));
  const total = totalPicks();
  for (let i = 1; i <= total; i++) if (!taken.has(i)) return i;
  return null;
}
function yourNextPick() {
  const slot = S().yourSlot;
  const taken = new Set(state.picks.filter(pk => pk.teamSlot === slot).map(pk => pk.pickNo));
  for (let r = 1; r <= totalRounds(); r++) {
    const pn = slotPicksInRound(slot, r);
    if (!taken.has(pn)) return { round: r, pickNo: pn };
  }
  return null;
}
function onClockSlot() {
  const n = nextOpenPickNo();
  return n === null ? null : pickToSlot(n).slot;
}
function isYourTurn() {
  return onClockSlot() === S().yourSlot;
}

// ---- rosters --------------------------------------------------
function rosterForSlot(slot) {
  return state.picks.filter(pk => pk.teamSlot === slot)
    .map(pk => state.players.find(p => p.id === pk.playerId)).filter(Boolean);
}
function getMyRoster() { return rosterForSlot(S().yourSlot); }

// generalized roster slotting driven by settings.roster
function buildSlots(players) {
  const r = S().roster;
  const slots = [];   // [{key, label, pos(cat), player}]
  STARTER_ORDER.forEach(cat => {
    for (let i = 0; i < (r[cat] || 0); i++) {
      slots.push({ cat, label: POS_CATALOG[cat].short, player: null });
    }
  });
  const benchN = r.BN || 0;
  const remaining = [...players];

  // greedy fill: dedicated first, then flexes (most-restrictive first), by draft order
  const fillPass = (predicate) => {
    slots.forEach(sl => {
      if (sl.player) return;
      const fills = POS_CATALOG[sl.cat].fills;
      if (!predicate(sl)) return;
      const idx = remaining.findIndex(p => fills.includes(p.pos));
      if (idx >= 0) { sl.player = remaining[idx]; remaining.splice(idx, 1); }
    });
  };
  // dedicated single-position starters
  fillPass(sl => POS_CATALOG[sl.cat].fills.length === 1);
  // flex slots (fills>1), narrower flexes first
  const flexOrder = slots.map((sl,i)=>({sl,i}))
    .filter(x => POS_CATALOG[x.sl.cat].fills.length > 1 && x.sl.cat !== 'BN')
    .sort((a,b) => POS_CATALOG[a.sl.cat].fills.length - POS_CATALOG[b.sl.cat].fills.length);
  flexOrder.forEach(({sl}) => {
    if (sl.player) return;
    const fills = POS_CATALOG[sl.cat].fills;
    const idx = remaining.findIndex(p => fills.includes(p.pos));
    if (idx >= 0) { sl.player = remaining[idx]; remaining.splice(idx, 1); }
  });
  // bench
  const bench = [];
  for (let i = 0; i < benchN; i++) bench.push({ cat: 'BN', label: 'BN' + (i + 1), player: remaining.length ? remaining.shift() : null });
  return { starters: slots, bench, overflow: remaining };
}

// need score per *fantasy position* for BPA weighting
function getMyNeeds() {
  const r = S().roster;
  const roster = getMyRoster();
  const counts = {};
  ['QB','RB','WR','TE','K','DEF','DL','LB','DB'].forEach(p => counts[p] = 0);
  roster.forEach(p => { if (counts[p.pos] != null) counts[p.pos]++; });

  // required starters by base position (dedicated)
  const reqQB = r.QB, reqRB = r.RB, reqWR = r.WR, reqTE = r.TE;
  const flexCap = (r.FLEX||0) + (r.FLEX_WR||0) + (r.FLEX_WT||0) + (r.SUPERFLEX||0);
  const need = { QB:0, RB:0, WR:0, TE:0, K:0, DEF:0, DL:0, LB:0, DB:0 };

  // dedicated shortfalls
  need.QB = counts.QB < reqQB ? 7 : (counts.QB === reqQB ? 1 : 0);
  need.TE = counts.TE < reqTE ? 6 : (counts.TE === reqTE ? 2 : 0);

  // flex-eligible pool (RB/WR/TE) drives the big weight
  const flexEligible = counts.RB + counts.WR + counts.TE;
  const flexTarget = reqRB + reqWR + reqTE + flexCap;
  const flexShort = Math.max(0, flexTarget - flexEligible);
  const rbBase = counts.RB < reqRB ? 8 : 2;
  const wrBase = counts.WR < reqWR ? 8 : 2;
  need.RB = rbBase + flexShort * 1.1;
  need.WR = wrBase + flexShort * 1.1;
  if (r.SUPERFLEX > 0 && counts.QB <= reqQB) need.QB += 4; // QB gains value in superflex

  const picksMade = state.picks.length;
  const total = totalPicks();
  need.K = (r.K > 0 && counts.K < r.K && picksMade > total * 0.78) ? 6 : 0;
  need.DEF = (r.DEF > 0 && counts.DEF < r.DEF && picksMade > total * 0.72) ? 6 : 0;
  return need;
}

function rankBPA(pool) {
  const need = getMyNeeds();
  const avail = (pool || state.players).filter(p => !p.drafted && !state.dnd[p.id]);
  const currentPick = nextOpenPickNo() || totalPicks();
  const byPos = {};
  avail.forEach(p => { (byPos[p.pos] = byPos[p.pos] || []).push(p); });
  Object.keys(byPos).forEach(k => byPos[k].sort((a,b) => a.adp - b.adp));
  const qset = new Set(state.queue);

  return avail.map(p => {
    let score = p.vbd;
    score += (need[p.pos] || 0) * 3;
    const adpDiff = currentPick - p.adp;
    if (adpDiff > 5) score += Math.min(adpDiff * 0.5, 15);
    const samePos = byPos[p.pos];
    const meIdx = samePos.findIndex(x => x.id === p.id);
    const nextEff = samePos[meIdx + 1] ? samePos[meIdx + 1].tier : 99;
    if (meIdx >= 0 && meIdx < 2 && p.tier < nextEff) score += 8;
    if (qset.has(p.id)) score += 14;
    return Object.assign({}, p, { score, isTarget: (need[p.pos] || 0) >= 5 && score > p.vbd + 5 });
  }).sort((a,b) => b.score - a.score);
}

function renderTopbar() {
  const pill = document.getElementById('turnPill');
  const sub = document.getElementById('turnSub');
  const done = nextOpenPickNo() === null;

  if (state.mode === 'idle' || !state.running) {
    pill.className = 'turn-pill wait'; pill.textContent = 'Pre-draft';
    sub.innerHTML = 'Mock or connect to begin';
    return;
  }
  if (done) {
    pill.className = 'turn-pill'; pill.textContent = 'Draft complete';
    sub.innerHTML = state.picks.length + ' picks';
    return;
  }
  const nxt = nextOpenPickNo();
  const { round, slot } = pickToSlot(nxt);
  const ynp = yourNextPick();

  if (state.mode === 'live') {
    pill.className = 'turn-pill live'; pill.textContent = '● LIVE';
    const dist = ynp ? ynp.pickNo - nxt : -1;
    sub.innerHTML = ynp
      ? (dist <= 0 ? '<span class="clock">YOUR PICK — take it in Sleeper</span>'
                   : 'Your pick in ' + dist + ' · ' + pickLabel(ynp.round, S().yourSlot))
      : 'Roster complete';
    return;
  }
  // mock / manual
  if (isYourTurn()) {
    pill.className = 'turn-pill'; pill.textContent = 'Your Turn';
    const clk = state.timeLeft > 0 ? ' · <span class="clock">' + fmtClock(state.timeLeft) + '</span>' : '';
    sub.innerHTML = 'Pick ' + pickLabel(round, slot) + clk;
  } else {
    pill.className = 'turn-pill wait'; pill.textContent = teamLabel(slot) + ' on clock';
    const dist = ynp ? ynp.pickNo - nxt : -1;
    sub.innerHTML = ynp ? ('You in ' + dist + ' · ' + pickLabel(ynp.round, S().yourSlot)) : 'Roster complete';
  }
}
function fmtClock(s) { const m = Math.floor(s/60); const ss = s%60; return m + ':' + String(ss).padStart(2,'0'); }

function renderBoard() {
  const grid = document.getElementById('boardGrid');
  const teams = S().teams, rounds = totalRounds();
  grid.style.gridTemplateColumns = '24px repeat(' + teams + ', 78px)';
  const oc = nextOpenPickNo();
  const newestPick = state.picks.length ? Math.max.apply(null, state.picks.map(function(p){ return p.pickNo; })) : 0;

  let html = '<div class="bcell rlabel head"></div>';
  for (let s = 1; s <= teams; s++) {
    const you = teamAtSlot(s).you;
    const lbl = teamLabel(s);
    const initials = lbl === 'YOU' ? '★' : lbl.replace(/[^A-Za-z0-9]/g,'').slice(0,2).toUpperCase();
    html += '<div class="bcell head' + (you ? ' you' : '') + '">' +
      '<span class="tlogo">' + escapeHtml(initials) + '</span>' +
      '<span class="tname">' + escapeHtml(lbl) + '</span></div>';
  }
  for (let r = 1; r <= rounds; r++) {
    html += '<div class="bcell rlabel">' + r + '</div>';
    for (let s = 1; s <= teams; s++) {
      const pickNo = slotPicksInRound(s, r);
      const pick = state.picks.find(pk => pk.pickNo === pickNo);
      const you = teamAtSlot(s).you;
      const cls = ['bcell'];
      if (you) cls.push('slotcol');
      const label = pickLabel(r, s);
      if (pick) {
        const pl = state.players.find(p => p.id === pick.playerId);
        cls.push('picked'); if (pl) cls.push('pk-' + pl.pos); if (you) cls.push('mine'); if (pick.isKeeper) cls.push('keeper');
        if (pick.pickNo === newestPick && state._animPick !== newestPick) cls.push('just');
        html += '<div class="' + cls.join(' ') + '"' + (pl ? ' onclick="openPlayerProfile(\'' + pl.id + '\')"' : '') + '>' +
          '<div class="bnum">' + pickNo + '</div>' +
          '<div class="bpick">' + label + '</div>' +
          '<div class="bname">' + escapeHtml(pl ? pl.name.split(' ').slice(-1)[0] : '?') + '</div>' +
          '<div class="bmeta pos-' + (pl?pl.pos:'') + '">' + (pl ? pl.pos + ' · ' + pl.team : '') + '</div></div>';
      } else if (oc === pickNo) {
        cls.push('onclock');
        html += '<div class="' + cls.join(' ') + '"><div class="oc">ON CLOCK</div><div class="bnum">' + pickNo + '</div><div class="bpick">' + label + '</div></div>';
      } else {
        cls.push('empty');
        html += '<div class="' + cls.join(' ') + '"><div class="bnum">' + pickNo + '</div><div class="bpn">' + label + '</div></div>';
      }
    }
  }
  grid.innerHTML = html;
  state._animPick = newestPick;

  // auto-scroll board to on-clock column
  if (oc && !state.boardCollapsed && pref('autoScroll')) {
    const { slot, round } = pickToSlot(oc);
    requestAnimationFrame(() => {
      const area = document.getElementById('boardArea');
      const colX = 24 + (slot - 0.5) * 81 - area.clientWidth / 2;
      const rowY = (round - 1) * 61 - area.clientHeight / 2 + 60;
      area.scrollTo({ left: Math.max(0, colX), top: Math.max(0, rowY), behavior: pref('reduceMotion') ? 'auto' : 'smooth' });
    });
  }
}

function currentPlayerList() {
  let list;
  if (state.filter === 'DND') {
    list = state.players.filter(p => !p.drafted && state.dnd[p.id]).sort((a,b)=>a.adp-b.adp);
  } else if (state.filter === 'QUEUE') {
    list = state.queue.map(id => state.players.find(p => p.id === id)).filter(p => p && !p.drafted);
  } else if (state.sort === 'RANK') {
    list = state.players.filter(p => !p.drafted && !state.dnd[p.id]).sort((a,b)=>a.adp-b.adp);
  } else {
    list = rankBPA();
  }
  if (['QB','RB','WR','TE','K','DEF'].includes(state.filter)) list = list.filter(p => p.pos === state.filter);
  const q = state.search.trim().toLowerCase();
  if (q) list = list.filter(p => p.name.toLowerCase().includes(q) || p.team.toLowerCase().includes(q));
  return list;
}

// Swipe the sheet grabber down to dismiss (peek-sheet gesture)
let _shDrag = null;
function initSheetDrag() {
  const sheet = document.getElementById('sheet');
  const grab = sheet && sheet.querySelector('.grab');
  if (!sheet || !grab) return;
  const begin = y => { _shDrag = { y0:y, dy:0 }; sheet.style.transition = 'none'; };
  const move = y => { if (!_shDrag) return; const dy = Math.max(0, y - _shDrag.y0); _shDrag.dy = dy; sheet.style.transform = 'translateY(' + dy + 'px)'; };
  const finish = () => { if (!_shDrag) return; const dy = _shDrag.dy; _shDrag = null; sheet.style.transition = ''; sheet.style.transform = ''; if (dy > 90) closeSheet(); };
  grab.addEventListener('touchstart', e => begin(e.touches[0].clientY), { passive:true });
  grab.addEventListener('touchmove', e => move(e.touches[0].clientY), { passive:true });
  grab.addEventListener('touchend', finish);
  grab.addEventListener('touchcancel', finish);
  grab.addEventListener('mousedown', e => {
    e.preventDefault(); begin(e.clientY);
    const mm = ev => move(ev.clientY);
    const mu = () => { finish(); document.removeEventListener('mousemove', mm); document.removeEventListener('mouseup', mu); };
    document.addEventListener('mousemove', mm); document.addEventListener('mouseup', mu);
  });
}
initSheetDrag();

/* ============================================================
   PLAYER DATABASE — tapping a name anywhere opens that player's
   real profile from the MeatballParm Player Database, embedded in
   an overlay so the draft never unloads.
   ============================================================ */
const DB_URL_DEFAULT = 'https://meatballparm88.github.io/Player-database-iphone-test/';
function dbUrl(){ try { return localStorage.getItem('mbp_db_url') || DB_URL_DEFAULT; } catch(e){ return DB_URL_DEFAULT; } }
function setDbUrl(u){ try { localStorage.setItem('mbp_db_url', u); } catch(e){} }
let _dbReady = false, _dbLoadedFor = null, _dbPid = null, _dbReadyTimer = null;

function openPlayerProfile(id) {
  const p = state.players.find(x => x.id === id);
  if (!p) return;
  _dbPid = id;
  document.getElementById('dbName').textContent = p.name;
  renderDbActs();
  const base = dbUrl();
  const frame = document.getElementById('dbFrame');
  const msg = document.getElementById('dbMsg');
  if (!base) {
    frame.style.display = 'none';
    msg.style.display = 'flex';
    msg.innerHTML = '<div style="max-width:270px">' +
      '<div style="font-size:16px;font-weight:800;color:var(--text);margin-bottom:8px">Link your Player Database</div>' +
      '<div style="margin-bottom:18px">Paste its web address once — then every player name opens their full card right here.</div>' +
      '<button class="sh-act go" style="justify-content:center" onclick="setDbUrlPrompt()">Add link</button>' +
      '</div>';
  } else {
    msg.style.display = 'none';
    frame.style.display = '';
    const sep = base.indexOf('#') >= 0 ? '&' : '#';
    const target = base + sep + 'embed=1&player=' + encodeURIComponent(p.name);
    if (_dbReady && _dbLoadedFor === base) {
      try { frame.contentWindow.postMessage({ mbp:'openPlayer', name:p.name }, '*'); }
      catch(e) { frame.src = target; }
    } else {
      _dbReady = false; _dbLoadedFor = base; frame.src = target;
      clearTimeout(_dbReadyTimer);
      _dbReadyTimer = setTimeout(function(){
        if (!_dbReady) toast('Database opened, but its jump-to-player bridge is missing — re-upload the Database file.', 'warn');
      }, 8000);
    }
  }
  document.getElementById('dbOverlay').classList.add('on');
  buzz(12);
}
function closeDB() {
  document.getElementById('dbOverlay').classList.remove('on');
  try { document.getElementById('dbFrame').contentWindow.postMessage({ mbp:'closeProfile' }, '*'); } catch(e){}
}
function renderDbActs() {
  const p = state.players.find(x => x.id === _dbPid);
  const el = document.getElementById('dbActs');
  if (!p) { el.innerHTML = ''; return; }
  const yourTurn = (state.mode === 'mock' || state.mode === 'manual') && isYourTurn();
  let h = '';
  if (yourTurn && !p.drafted) h += '<button class="go" onclick="dbDraft()">DRAFT</button>';
  h += '<button onclick="dbQueueToggle()">' + (state.queue.includes(p.id) ? 'IN QUEUE ✓' : '＋ QUEUE') + '</button>';
  h += '<button onclick="closeDB()">CLOSE</button>';
  el.innerHTML = h;
}
function dbDraft(){ if (_dbPid) { draftPlayer(_dbPid, S().yourSlot); closeDB(); } }
function dbQueueToggle(){ if (_dbPid) { toggleQueue(null, _dbPid); renderDbActs(); } }
function setDbUrlPrompt() {
  const v = prompt('Player Database web address\n\nPaste the full URL of your Player Database app.', dbUrl() || 'https://');
  if (v === null) return;
  const u = v.trim();
  if (!u || u === 'https://') { setDbUrl(''); toast('Reset to the default Player Database.', 'info'); }
  else { setDbUrl(u); _dbReady = false; _dbLoadedFor = null; toast('Player Database linked.', 'success'); }
  renderSettingsHub();
}
window.addEventListener('message', function(ev){
  const d = ev.data;
  if (!d || typeof d !== 'object') return;
  if (d.mbp === 'ready') { _dbReady = true; clearTimeout(_dbReadyTimer); }
  else if (d.mbp === 'closed') closeDB();
});
(function(){
  const card = document.getElementById('dbCard'), g = document.getElementById('dbGrab');
  if (!card || !g) return;
  let y0 = 0, dy = 0, on = false;
  const st = e => { on = true; y0 = (e.touches?e.touches[0]:e).clientY; dy = 0; card.style.transition = 'none'; };
  const mv = e => { if (!on) return; dy = Math.max(0, (e.touches?e.touches[0]:e).clientY - y0); card.style.transform = 'translateY(' + dy + 'px)'; };
  const en = () => { if (!on) return; on = false; card.style.transition = ''; card.style.transform = ''; if (dy > 100) closeDB(); };
  g.addEventListener('touchstart', st, { passive:true });
  g.addEventListener('touchmove', mv, { passive:true });
  g.addEventListener('touchend', en);
  g.addEventListener('mousedown', e => {
    e.preventDefault(); st(e);
    const m = ev => mv(ev), u = () => { en(); document.removeEventListener('mousemove', m); document.removeEventListener('mouseup', u); };
    document.addEventListener('mousemove', m); document.addEventListener('mouseup', u);
  });
})();

/* ============================================================
   DRAFTING
   ============================================================ */
function onDraftBtn(ev, id) {
  if (ev) ev.stopPropagation();
  if (state.mode === 'live') { toast('Live draft — make the pick in Sleeper. I\'ll track it.', 'warn'); return; }
  if (state.mode === 'idle' || !state.running) { openPlayer(id); return; }
  if (state.mode === 'mock') {
    if (!isYourTurn()) { toast('Not your pick yet — tap ＋ to queue instead.', 'info'); return; }
    if (pref('confirmPick')) {
      const p = state.players.find(x => x.id === id);
      if (p && !confirm('Draft ' + p.name + ' (' + p.pos + ') to your team?')) return;
    }
    draftPlayer(id, S().yourSlot);
  } else if (state.mode === 'manual') {
    const oc = nextOpenPickNo();
    if (oc === null) { toast('Draft complete.', 'warn'); return; }
    draftPlayer(id, pickToSlot(oc).slot);
  }
}

function recordPick(playerId, teamSlot, opts) {
  opts = opts || {};
  const p = state.players.find(x => x.id === playerId);
  if (!p || p.drafted) return false;
  const pickNo = opts.pickNo || nextOpenPickNo();
  if (pickNo === null) return false;
  const { round } = pickToSlot(pickNo);
  p.drafted = true; p.draftedBy = teamSlot; p.draftedAt = pickNo;
  state.picks.push({ pickNo, round, teamSlot, playerId, isKeeper: !!opts.isKeeper });
  state.picks.sort((a,b)=>a.pickNo-b.pickNo);
  return true;
}

function draftPlayer(id, teamSlot) {
  const p = state.players.find(x => x.id === id);
  if (!recordPick(id, teamSlot)) { toast('Could not record that pick.', 'danger'); return; }
  const qi = state.queue.indexOf(id); if (qi >= 0) state.queue.splice(qi, 1);
  closeSheet();
  const mine = teamSlot === S().yourSlot;
  toast((mine ? '✓ You drafted ' : 'Picked: ') + p.name, mine ? 'success' : 'info');
  if (mine) buzz(30);
  persist();
  if (state.mode === 'mock') { clearPickTimer(); renderAll(); scheduleMock(); }
  else renderAll();
}


/* ============================================================
   MOCK DRAFT — AI opponents + pick timer
   ============================================================ */
function startMock() {
  normalizeOrder();
  state.mode = 'mock';
  state.running = true;
  state.picks = [];
  state.players = initPlayers();
  state.onClockAlerted = 0;
  document.getElementById('startOverlay').classList.add('hidden');
  toast('Mock draft started — ' + S().teams + ' teams, ' + totalRounds() + ' rounds', 'success');
  renderAll();
  scheduleMock();
}

function stopMock(silent) {
  clearPickTimer();
  if (state.aiHandle) { clearTimeout(state.aiHandle); state.aiHandle = null; }
  state.running = false;
  state.mode = 'idle';
  if (!silent) { renderAll(); }
}

// AI valuation for a given team slot: blend ADP order with that team's needs
function aiPickFor(slot) {
  const avail = state.players.filter(p => !p.drafted);
  if (!avail.length) return null;
  const roster = rosterForSlot(slot);
  const r = S().roster;
  const counts = {}; ['QB','RB','WR','TE','K','DEF','DL','LB','DB'].forEach(p=>counts[p]=0);
  roster.forEach(p => { if (counts[p.pos]!=null) counts[p.pos]++; });

  const picksMade = state.picks.length;
  const total = totalPicks();
  const latePhase = picksMade > total * 0.72;

  // positional starter targets
  const flexCap = (r.FLEX||0)+(r.FLEX_WR||0)+(r.FLEX_WT||0)+(r.SUPERFLEX||0);
  const flexTarget = (r.RB||0)+(r.WR||0)+(r.TE||0)+flexCap;
  const flexHave = counts.RB+counts.WR+counts.TE;

  const scored = avail.map(p => {
    // base: ADP desirability (earlier ADP = higher). Use negative adp as base rank.
    let v = 1000 - p.adp * 3.2;
    // need bumps
    if (p.pos === 'QB') {
      if (counts.QB < (r.QB||0)) v += 55;
      else if (r.SUPERFLEX && counts.QB < (r.QB||0)+(r.SUPERFLEX||0)) v += 22;
      else v -= 40;
    }
    if (p.pos === 'TE') {
      if (counts.TE < (r.TE||0)) v += 42; else v -= 12;
    }
    if (p.pos === 'RB' || p.pos === 'WR') {
      if (flexHave < flexTarget) v += 30;
      const dedTarget = p.pos === 'RB' ? (r.RB||0) : (r.WR||0);
      if ((p.pos==='RB'?counts.RB:counts.WR) < dedTarget) v += 18;
    }
    if (p.pos === 'K') { v += (r.K && counts.K < r.K && latePhase) ? 60 : -400; }
    if (p.pos === 'DEF') { v += (r.DEF && counts.DEF < r.DEF && picksMade > total*0.62) ? 55 : -320; }
    if (!POS_CATALOG[p.pos] && ['DL','LB','DB'].indexOf(p.pos) < 0) { /* offense only pool */ }
    // small noise so mocks vary run-to-run
    v += (Math.random() - 0.5) * 14;
    return { p, v };
  }).sort((a,b) => b.v - a.v);

  // pick from a small top window (human-ish variance)
  const window = scored.slice(0, Math.min(4, scored.length));
  const weights = [0.6, 0.24, 0.11, 0.05];
  let roll = Math.random(), acc = 0, chosen = window[0];
  for (let i = 0; i < window.length; i++) { acc += weights[i] || 0; if (roll <= acc) { chosen = window[i]; break; } }
  return chosen.p;
}

function scheduleMock() {
  if (state.mode !== 'mock' || !state.running) return;
  const oc = nextOpenPickNo();
  if (oc === null) { finishDraft(); return; }
  const { slot } = pickToSlot(oc);
  renderTopbar();

  if (slot === S().yourSlot) {
    // your turn — start the pick timer, surface queue suggestion
    startPickTimer();
    onYourTurn();
    return;
  }
  // AI turn — brief think delay, then pick
  clearPickTimer();
  const delay = 260 + Math.random() * 520;
  state.aiHandle = setTimeout(() => {
    if (state.mode !== 'mock' || !state.running) return;
    const cur = nextOpenPickNo();
    if (cur === null) { finishDraft(); return; }
    const { slot: cs } = pickToSlot(cur);
    if (cs === S().yourSlot) { scheduleMock(); return; }
    const p = aiPickFor(cs);
    if (p) recordPick(p.id, cs);
    renderAll();
    scheduleMock();
  }, delay);
}

function onYourTurn() {
  if (state.onClockAlerted === nextOpenPickNo()) return;
  state.onClockAlerted = nextOpenPickNo();
  if (!pref('clockAlert')) return;
  buzz([90,50,90]);
  // suggest top available queued player, else BPA
  const topQueued = state.queue.map(id => state.players.find(p=>p.id===id)).find(p => p && !p.drafted);
  const bpa = rankBPA()[0];
  const sugg = topQueued || bpa;
  if (sugg) toast("Your pick — suggested: " + sugg.name + ' (' + sugg.pos + ')' + (topQueued?' · from queue':''), 'success');
}

function startPickTimer() {
  clearPickTimer();
  const secs = S().timePerPick;
  if (!secs) { state.timeLeft = 0; renderTopbar(); return; }
  state.timeLeft = secs;
  renderTopbar();
  state.tickHandle = setInterval(() => {
    state.timeLeft--;
    renderTopbar();
    if (state.timeLeft <= 0) {
      clearPickTimer();
      if (S().cpuAutopick) {
        const topQueued = state.queue.map(id => state.players.find(p=>p.id===id)).find(p => p && !p.drafted);
        const p = topQueued || rankBPA()[0];
        if (p) { toast('Time — auto-picked ' + p.name, 'warn'); draftPlayer(p.id, S().yourSlot); }
      } else {
        toast('Time expired — pick a player', 'warn');
      }
    }
  }, 1000);
}
function clearPickTimer() {
  if (state.tickHandle) { clearInterval(state.tickHandle); state.tickHandle = null; }
  state.timeLeft = 0;
}

function finishDraft() {
  clearPickTimer();
  state.running = false;
  renderAll();
  toast('Draft complete — ' + state.picks.length + ' picks. Save it from the ⋯ menu.', 'success');
  buzz([60,40,60,40,120]);
  // offer to save
  setTimeout(() => offerSaveCompleted(), 400);
}

/* ---- manual mode ---- */
function startManual() {
  normalizeOrder();
  state.mode = 'manual';
  state.running = true;
  state.picks = [];
  state.players = initPlayers();
  document.getElementById('startOverlay').classList.add('hidden');
  toast('Manual draft — tap DRAFT to record each pick in order', 'success');
  renderAll();
}


/* ============================================================
   DRAFT SETTINGS SCREEN (mirrors Sleeper)
   Edits a working copy; commits on SAVE.
   ============================================================ */
let draftSettings = null;   // working copy while editing

function openSettings() {
  if (state.running && !confirm('A draft is in progress. Opening settings won\'t change the current draft, but changing structure applies to your next draft. Continue?')) return;
  draftSettings = JSON.parse(JSON.stringify(state.settings));
  if (!draftSettings.order || draftSettings.order.length !== draftSettings.teams) {
    state.settings = draftSettings; normalizeOrder(); draftSettings = JSON.parse(JSON.stringify(state.settings));
  }
  renderSettings();
  document.getElementById('settingsScreen').classList.add('on');
}
function closeSettings() { document.getElementById('settingsScreen').classList.remove('on'); }

function saveSettings() {
  const ds = draftSettings;
  // recompute order length + your flag
  state.settings = ds;
  normalizeOrder();
  persist();
  closeSettings();
  // if not mid-draft, rebuild pool (scoring/teams may have changed)
  if (!state.running) { state.players = initPlayers(); state.picks = []; }
  renderAll();
  toast('Settings saved · ' + totalRounds() + ' rounds · ' + scoringLabel(state.settings.scoring), 'success');
}

function renderSettings() {
  const ds = draftSettings;
  const body = document.getElementById('settingsBody');
  const H = [];

  // DRAFT NAME
  H.push(sGroup('◈ DRAFT NAME', '',
    '<input class="field-in" id="setName" placeholder="Draft Name" value="' + escapeHtml(ds.name) + '" oninput="draftSettings.name=this.value">'));

  // DRAFT TYPE
  H.push(sGroup('◈ DRAFT TYPE', '',
    '<div class="pill-row">' +
      typePill('snake','SNAKE','Serpentine', ds.draftType) +
      typePill('linear','LINEAR','Non-snaking', ds.draftType) +
      '<div class="pill-opt dis"><div class="po1">AUCTION</div><div class="po2">Not available</div></div>' +
    '</div>'));

  // THIRD ROUND REVERSAL
  H.push(sGroup('◈ THIRD ROUND REVERSAL', '',
    toggleRow('Reverses the snake direction starting from round 3.', ds.thirdRoundReversal, 'trr')));

  // SCORING
  H.push(sGroup('◈ SCORING (FOR RANKINGS)', 'Rankings data is available for the three formats below.',
    scoreRadio('standard','Standard', ds.scoring) +
    scoreRadio('ppr','PPR', ds.scoring) +
    scoreRadio('half_ppr','Half-PPR', ds.scoring) +
    '<div class="radio-row dis"><div class="rc"></div><div class="rt">2QB / Superflex</div></div>' +
    '<div class="radio-row dis"><div class="rc"></div><div class="rt">IDP</div></div>'));

  // TEAMS
  let teamsH = '<div class="circ-row">';
  [4,6,8,10,12,14,16].forEach(n => {
    teamsH += '<div class="circ' + (ds.teams===n?' on':'') + '" onclick="setTeams(' + n + ')"><div class="c1">' + n + '</div></div>';
  });
  teamsH += '</div>';
  H.push(sGroup('◈ TEAMS', '', teamsH));

  // AVAILABLE PLAYERS
  H.push(sGroup('◈ AVAILABLE PLAYERS', 'Rookie/vet split needs data we don\'t carry — ALL only.',
    '<div class="pill-row">' +
      '<div class="pill-opt on"><div class="po1">ALL</div><div class="po2">Players</div></div>' +
      '<div class="pill-opt dis"><div class="po1">ROOKIES</div><div class="po2">n/a</div></div>' +
      '<div class="pill-opt dis"><div class="po1">VETS</div><div class="po2">n/a</div></div>' +
    '</div>'));

  // TIME PER PICK
  let timeH = '<div class="circ-row">';
  [{v:0,l:'NO',s:'Limit'},{v:10,l:'10',s:'Secs'},{v:15,l:'15',s:'Secs'},{v:20,l:'20',s:'Secs'},{v:30,l:'30',s:'Secs'},{v:60,l:'60',s:'Secs'},{v:90,l:'90',s:'Secs'}].forEach(o => {
    timeH += '<div class="circ' + (ds.timePerPick===o.v?' on':'') + '" onclick="draftSettings.timePerPick=' + o.v + ';renderSettings()"><div class="c1">' + o.l + '</div><div class="c2">' + o.s + '</div></div>';
  });
  timeH += '</div>';
  H.push(sGroup('◈ TIME PER PICK', 'Used in mock drafts (your pick).', timeH));

  // CPU AUTOPICK
  H.push(sGroup('◈ CPU AUTOPICK', '',
    toggleRow('Auto-pick your best available (or top queued) when your timer runs out.', ds.cpuAutopick, 'cpu')));

  // ROSTER
  let rosterH = '';
  STARTER_ORDER.forEach(cat => rosterH += stepRow(cat));
  rosterH += stepRow('BN');
  rosterH += '<div class="rounds-note" id="roundsNote"></div>';
  H.push(sGroup('◈ ROSTER', settingsRosterSummary(), rosterH));

  // DRAFT ORDER
  let orderH = '<div class="sgroup-sub" style="margin-top:0">Tap ▲▼ to reorder. Tap a name to rename. Star = your team.</div>';
  orderH += '<button class="btn ghost-acc" onclick="randomizeOrder()">🎲 RANDOMIZE ORDER</button>';
  orderH += '<div id="orderRows" style="margin-top:8px"></div>';
  H.push(sGroup('◷ DRAFT ORDER', '', orderH));

  H.push('<div style="height:16px"></div>');
  body.innerHTML = H.join('');
  renderRoundsNote();
  renderOrderRows();
}

function sGroup(title, sub, inner) {
  return '<div class="sgroup"><div class="sgroup-h"><span class="ic">' + title.charAt(0) + '</span>' +
    title.slice(2) + '</div>' + (sub ? '<div class="sgroup-sub">' + sub + '</div>' : '') + inner + '</div>';
}
function typePill(v, t, s, cur) {
  return '<div class="pill-opt' + (cur===v?' on':'') + '" onclick="draftSettings.draftType=\'' + v + '\';renderSettings()"><div class="po1">' + t + '</div><div class="po2">' + s + '</div></div>';
}
function scoreRadio(v, t, cur) {
  return '<div class="radio-row' + (cur===v?' on':'') + '" onclick="draftSettings.scoring=\'' + v + '\';renderSettings()"><div class="rc"></div><div class="rt">' + t + '</div></div>';
}
function toggleRow(txt, on, key) {
  return '<div class="toggle-row"><div class="tr-txt"><div class="tr-s">' + txt + '</div></div>' +
    '<div class="switch' + (on?' on':'') + '" onclick="toggleSet(\'' + key + '\')"><i></i></div></div>';
}
function toggleSet(key) {
  if (key === 'trr') draftSettings.thirdRoundReversal = !draftSettings.thirdRoundReversal;
  if (key === 'cpu') draftSettings.cpuAutopick = !draftSettings.cpuAutopick;
  renderSettings();
}
function setTeams(n) {
  draftSettings.teams = n;
  // resize order
  const cur = draftSettings.order || [];
  const next = [];
  for (let i = 0; i < n; i++) next.push(cur[i] || { id:'t'+(i+1), name:'Team '+(i+1), you:false });
  draftSettings.order = next;
  if (draftSettings.yourSlot > n) draftSettings.yourSlot = n;
  renderSettings();
}
function stepRow(cat) {
  const c = POS_CATALOG[cat];
  const val = draftSettings.roster[cat] || 0;
  const sub = c.offense === false ? '<span class="ssub">(no player data)</span>' : '';
  return '<div class="step-row"><div class="sl"><span class="dot ' + cat + '"></span><span class="snm">' + c.label + '</span>' + sub + '</div>' +
    '<div class="stepper"><button class="minus" onclick="stepRoster(\'' + cat + '\',-1)"' + (val<=0?' disabled':'') + '>−</button>' +
    '<span class="sv" id="sv_' + cat + '">' + val + '</span>' +
    '<button onclick="stepRoster(\'' + cat + '\',1)">+</button></div></div>';
}
function stepRoster(cat, d) {
  draftSettings.roster[cat] = clamp((draftSettings.roster[cat]||0) + d, 0, 12);
  document.getElementById('sv_' + cat).textContent = draftSettings.roster[cat];
  renderRoundsNote();
}
function settingsRosterSummary() {
  const save = state.settings; state.settings = draftSettings;
  const s = rosterLabel(); state.settings = save; return s;
}
function renderRoundsNote() {
  const save = state.settings; state.settings = draftSettings;
  const rounds = totalRounds(); state.settings = save;
  const el = document.getElementById('roundsNote');
  if (el) el.textContent = rounds + ' rounds total · ' + (draftSettings.teams * rounds) + ' picks';
}
function renderOrderRows() {
  const el = document.getElementById('orderRows');
  if (!el) return;
  const ds = draftSettings;
  const n = ds.teams;
  const cur = ds.order || [];
  for (let i = 0; i < n; i++) if (!cur[i]) cur[i] = { id:'t'+(i+1), name:'Team '+(i+1), you:false };
  ds.order = cur.slice(0, n);
  ds.order.forEach((t,i)=>t.you = (i+1)===ds.yourSlot);

  let html = '';
  ds.order.forEach((t, i) => {
    const you = (i+1) === ds.yourSlot;
    const init = t.name.replace(/[^A-Za-z0-9]/g,'').slice(0,2).toUpperCase() || (i+1);
    html += '<div class="order-row' + (you?' you':'') + '">' +
      '<div class="oidx">' + (i+1) + '</div>' +
      '<div class="olog">' + (you?'★':escapeHtml(init)) + '</div>' +
      '<div class="oinfo" onclick="renameOrderTeam(' + i + ')"><div class="onm">' + escapeHtml(t.name) + '</div>' +
        '<div class="osub">Draft position #' + (i+1) + (you?' <span class="oyou">· YOU</span>':'') + '</div></div>' +
      (you?'':'<button class="btn" style="width:auto;padding:7px 10px;margin:0;font-size:9px" onclick="setYouSlot(' + (i+1) + ')">SET AS ME</button>') +
      '<div class="omove"><button onclick="moveOrder(' + i + ',-1)">▲</button><button onclick="moveOrder(' + i + ',1)">▼</button></div>' +
    '</div>';
  });
  el.innerHTML = html;
}
function setYouSlot(slot) { draftSettings.yourSlot = slot; renderOrderRows(); }
function moveOrder(i, d) {
  const arr = draftSettings.order; const j = i + d;
  if (j < 0 || j >= arr.length) return;
  const t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  // keep your slot pointing at the same team
  if (draftSettings.yourSlot === i+1) draftSettings.yourSlot = j+1;
  else if (draftSettings.yourSlot === j+1) draftSettings.yourSlot = i+1;
  renderOrderRows();
}
function randomizeOrder() {
  const arr = draftSettings.order;
  const youTeam = arr[draftSettings.yourSlot - 1];
  for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  draftSettings.yourSlot = arr.indexOf(youTeam) + 1;
  renderOrderRows();
  toast('Order randomized', 'info');
}
function renameOrderTeam(i) {
  const cur = draftSettings.order[i];
  document.getElementById('sheetBody').innerHTML =
    '<div class="sh-title">Rename team</div>' +

function openSavedDraft(id) {
  const arr = loadSaved();
  const d = arr.find(x => x.id === id);
  if (!d) return;
  if (state.running && !confirm('Load this saved draft? Your current in-progress draft will be replaced (save it first if needed).')) return;
  // restore
  state.settings = Object.assign(defaultSettings(), d.settings, { roster: Object.assign(defaultSettings().roster, (d.settings&&d.settings.roster)||{}) });
  normalizeOrder();
  state.players = initPlayers();
  state.picks = [];
  (d.picks || []).forEach(pk => {
    const p = state.players.find(x => x.id === pk.playerId);
    if (p) { p.drafted = true; p.draftedBy = pk.teamSlot; p.draftedAt = pk.pickNo; }
    state.picks.push({ pickNo: pk.pickNo, round: pk.round, teamSlot: pk.teamSlot, playerId: pk.playerId, isKeeper: pk.isKeeper });
  });
  state.picks.sort((a,b)=>a.pickNo-b.pickNo);
  clearPickTimer();
  if (state.aiHandle) { clearTimeout(state.aiHandle); state.aiHandle = null; }

  const complete = nextOpenPickNo() === null;
  closeSaved();
  if (complete) {
    state.mode = (d.mode === 'live' ? 'live' : d.mode) || 'mock';
    state.running = false;
    renderAll();
    toast('Loaded "' + d.name + '" (complete) — view only', 'info');
  } else if (d.mode === 'mock') {
    state.mode = 'mock'; state.running = true;
    renderAll();
    toast('Resuming "' + d.name + '"', 'success');
    scheduleMock();
  } else {
    state.mode = d.mode === 'live' ? 'manual' : (d.mode || 'manual'); // can't auto-reconnect live picks; continue manually
    state.running = true;
    renderAll();
    toast('Resuming "' + d.name + '" — continue picks manually', 'info');
  }
}
