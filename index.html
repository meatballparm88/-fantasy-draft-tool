}
function menuAct(ic, txt, fn, kind) {
  return '<button class="sh-act ' + (kind||'') + '" onclick="closeSheet();' + fn + '"><span class="ic">' + ic + '</span>' + txt + '</button>';
}
function confirmStopMock() {
  if (confirm('Stop this mock draft? You can save it first from the menu if you want to keep it.')) stopMock();
}


/* ============================================================
   SAVED DRAFTS LIBRARY  (localStorage)
   A saved draft snapshots: settings (incl. order + roster),
   picks, scoring, mode, and completion status.
   ============================================================ */
function loadSaved() {
  try { return JSON.parse(localStorage.getItem(SAVED_KEY) || '[]'); } catch (e) { return []; }
}
function writeSaved(arr) {
  try { localStorage.setItem(SAVED_KEY, JSON.stringify(arr)); return true; }
  catch (e) { toast('Storage full — could not save.', 'danger'); return false; }
}
function genId() { return 'd_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function snapshotDraft(name) {
  return {
    id: genId(),
    name: name || (S().name || 'Draft') ,
    savedAt: Date.now(),
    complete: nextOpenPickNo() === null,
    mode: state.mode,
    scoring: S().scoring,
    teams: S().teams,
    rounds: totalRounds(),
    yourSlot: S().yourSlot,
    picksCount: state.picks.length,
    settings: JSON.parse(JSON.stringify(state.settings)),
    picks: JSON.parse(JSON.stringify(state.picks))
  };
}

// Called from menu / after completion
function saveCurrentDraft() {
  if (!state.picks.length) { toast('No picks to save yet.', 'warn'); return; }
  const def = S().name || (scoringLabel(S().scoring) + ' ' + S().teams + 'TM ' + new Date().toLocaleDateString());
  document.getElementById('sheetBody').innerHTML =
    '<div class="sh-title">Save draft</div>' +
    '<div class="sh-sub">' + state.picks.length + ' picks · ' + (nextOpenPickNo()===null?'complete':'in progress') + '</div>' +
    '<input class="sh-field" id="saveNameInput" value="' + escapeHtml(def) + '" maxlength="40">' +
    '<button class="sh-act go" onclick="commitSaveDraft()"><span class="ic">💾</span>Save</button>' +
    '<button class="sh-act" onclick="closeSheet()"><span class="ic">↓</span>Cancel</button>';
  openSheet();
  setTimeout(()=>{ const el=document.getElementById('saveNameInput'); el.focus(); el.select(); }, 80);
}
function commitSaveDraft() {
  const name = document.getElementById('saveNameInput').value.trim() || 'Draft';
  const arr = loadSaved();
  const snap = snapshotDraft(name);
  arr.unshift(snap);
  if (writeSaved(arr)) { closeSheet(); toast('Saved: ' + name, 'success'); }
}
function offerSaveCompleted() {
  const def = (S().name || (scoringLabel(S().scoring) + ' ' + S().teams + 'TM')) + ' · ' + new Date().toLocaleDateString();
  document.getElementById('sheetBody').innerHTML =
    '<div class="sh-title">Draft complete 🎉</div>' +
    '<div class="sh-sub">' + state.picks.length + ' picks. Save it to your library?</div>' +
    '<input class="sh-field" id="saveNameInput" value="' + escapeHtml(def) + '" maxlength="40">' +
    '<button class="sh-act go" onclick="commitSaveDraft()"><span class="ic">💾</span>Save draft</button>' +
    '<button class="sh-act" onclick="closeSheet()"><span class="ic">↓</span>Not now</button>';
  openSheet();
}

function openSaved() { renderSaved(); document.getElementById('savedScreen').classList.add('on'); }
function closeSaved() { document.getElementById('savedScreen').classList.remove('on'); }

function renderSaved() {
  const arr = loadSaved();
  const body = document.getElementById('savedBody');
  if (!arr.length) {
    body.innerHTML = '<div class="empty" style="padding-top:60px">No saved drafts yet.<br><br>Finish a mock or connect a live draft,<br>then Save it from the ⋯ menu.</div>';
    return;
  }
  let html = '';
  arr.forEach(d => {
    const when = new Date(d.savedAt).toLocaleDateString(undefined,{month:'short',day:'numeric'}) + ' ' +
                 new Date(d.savedAt).toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
    const badge = d.complete ? '<span class="sc-badge done">Complete</span>' : '<span class="sc-badge prog">In progress</span>';
    html += '<div class="save-card">' +
      '<div class="sc-top"><div><div class="sc-nm">' + escapeHtml(d.name) + '</div>' +
        '<div class="sc-meta">' + d.teams + '-TM · ' + d.rounds + ' RD · ' + scoringLabel(d.scoring).toUpperCase() +
          ' · ' + (d.picksCount) + ' picks · slot ' + d.yourSlot + '<br>' + when + ' · ' + (d.mode||'').toUpperCase() + '</div></div>' + badge + '</div>' +
      '<div class="sc-acts">' +
        '<button class="go" onclick="openSavedDraft(\'' + d.id + '\')">' + (d.complete?'VIEW':'CONTINUE') + '</button>' +
        '<button onclick="renameSaved(\'' + d.id + '\')">RENAME</button>' +
        '<button onclick="duplicateSaved(\'' + d.id + '\')">DUPLICATE</button>' +
        '<button class="del" onclick="deleteSaved(\'' + d.id + '\')">DELETE</button>' +
      '</div></div>';
  });
  body.innerHTML = html;
}

function openSavedDraft(id) {
  const arr = loadSaved();
  const d = arr.find(x => x.id === id);
  if (!d) return;
  if (state.running && !confirm('Load this saved draft? Your current in-progress draft will be replaced (save it first if needed).')) return;
  // restore
  state.settings = Object.assign(defaultSettings(), d.settings, { roster: Object.assign(defaultSettings().roster, (d.settings&&d.settings.roster)||{}) });
  normalizeOrder();
  state.players = initPlayers();
  state.picks = [];
  (d.picks || []).forEach(pk => {
    const p = state.players.find(x => x.id === pk.playerId);
    if (p) { p.drafted = true; p.draftedBy = pk.teamSlot; p.draftedAt = pk.pickNo; }
    state.picks.push({ pickNo: pk.pickNo, round: pk.round, teamSlot: pk.teamSlot, playerId: pk.playerId, isKeeper: pk.isKeeper });
  });
  state.picks.sort((a,b)=>a.pickNo-b.pickNo);
  clearPickTimer();
  if (state.aiHandle) { clearTimeout(state.aiHandle); state.aiHandle = null; }

  const complete = nextOpenPickNo() === null;
  closeSaved();
  if (complete) {
    state.mode = (d.mode === 'live' ? 'live' : d.mode) || 'mock';
    state.running = false;
    renderAll();
    toast('Loaded "' + d.name + '" (complete) — view only', 'info');
  } else if (d.mode === 'mock') {
    state.mode = 'mock'; state.running = true;
    renderAll();
    toast('Resuming "' + d.name + '"', 'success');
    scheduleMock();
  } else {
    state.mode = d.mode === 'live' ? 'manual' : (d.mode || 'manual'); // can't auto-reconnect live picks; continue manually
    state.running = true;
    renderAll();
    toast('Resuming "' + d.name + '" — continue picks manually', 'info');
  }
}

function renameSaved(id) {
  const arr = loadSaved();
  const d = arr.find(x => x.id === id); if (!d) return;
  document.getElementById('sheetBody').innerHTML =
    '<div class="sh-title">Rename draft</div><div class="sh-sub">' + escapeHtml(d.name) + '</div>' +
    '<input class="sh-field" id="renameSavedInput" value="' + escapeHtml(d.name) + '" maxlength="40">' +
    '<button class="sh-act go" onclick="commitRenameSaved(\'' + id + '\')"><span class="ic">✓</span>Save</button>' +
    '<button class="sh-act" onclick="closeSheet()"><span class="ic">↓</span>Cancel</button>';
  openSheet();
  setTimeout(()=>{ const el=document.getElementById('renameSavedInput'); el.focus(); el.select(); }, 80);
}
function commitRenameSaved(id) {
  const v = document.getElementById('renameSavedInput').value.trim();
  if (!v) { closeSheet(); return; }
  const arr = loadSaved(); const d = arr.find(x=>x.id===id);
  if (d) { d.name = v; writeSaved(arr); }
  closeSheet(); renderSaved();
}
function duplicateSaved(id) {
  const arr = loadSaved(); const d = arr.find(x=>x.id===id); if (!d) return;
  const copy = JSON.parse(JSON.stringify(d));
  copy.id = genId(); copy.name = d.name + ' (copy)'; copy.savedAt = Date.now();
  arr.unshift(copy); writeSaved(arr); renderSaved();
  toast('Duplicated', 'success');
}
function deleteSaved(id) {
  const arr = loadSaved(); const d = arr.find(x=>x.id===id); if (!d) return;
  if (!confirm('Delete "' + d.name + '"? This can\'t be undone.')) return;
  writeSaved(arr.filter(x => x.id !== id)); renderSaved();
  toast('Deleted', 'info');
}


/* ============================================================
   LIVE SLEEPER SYNC — advise mode (read-only tracking)
   ============================================================ */
function parseDraftId(raw) {
  if (!raw) return null;
  const m = String(raw).trim().match(/(\d{15,25})/);
  return m ? m[1] : null;
}
const normalizeName = (s) => (s || '')
  .toLowerCase().replace(/[.'’]/g,'').replace(/\s+(jr|sr|ii|iii|iv)\.?$/i,'').trim();

// map Sleeper roster_positions[] -> our roster counts
function rosterFromSleeper(positions) {
  if (!Array.isArray(positions)) return null;
  const r = { QB:0, RB:0, WR:0, TE:0, FLEX:0, FLEX_WR:0, FLEX_WT:0, SUPERFLEX:0, K:0, DEF:0, DL:0, LB:0, DB:0, IDP_FLEX:0, BN:0 };
  const map = {
    QB:'QB', RB:'RB', WR:'WR', TE:'TE', K:'K', DEF:'DEF',
    FLEX:'FLEX', WRRB_FLEX:'FLEX_WR', REC_FLEX:'FLEX_WT', WRTE_FLEX:'FLEX_WT',
    SUPER_FLEX:'SUPERFLEX', DL:'DL', LB:'LB', DB:'DB', IDP_FLEX:'IDP_FLEX', BN:'BN'
  };
  positions.forEach(pos => { const k = map[pos]; if (k) r[k] = (r[k]||0) + 1; else r.BN += 1; });
  return r;
}

function openConnect() {
  document.getElementById('sheetBody').innerHTML =
    '<div class="sh-title">Connect to Sleeper</div>' +
    '<div class="sh-sub">Read-only — I track your live draft and advise. You still tap picks in Sleeper.</div>' +
    '<input class="sh-field" id="connUser" placeholder="Sleeper username" value="' + escapeHtml(state.sleeperUsername) + '" autocapitalize="off" autocorrect="off" spellcheck="false">' +
    '<button class="sh-act" onclick="findDrafts()"><span class="ic">🔍</span>Find my drafts</button>' +
    '<div id="draftsList" style="margin:2px 0 8px"></div>' +
    '<input class="sh-field" id="connId" placeholder="…or paste Draft ID / URL" inputmode="numeric">' +
    '<button class="sh-act go" onclick="doConnect()"><span class="ic">◎</span>Connect &amp; sync</button>' +
    '<button class="sh-act" onclick="closeSheet()"><span class="ic">↓</span>Cancel</button>';
  openSheet();
}

async function findDrafts() {
  const username = document.getElementById('connUser').value.trim();
  const listEl = document.getElementById('draftsList');
  if (!username) { listEl.innerHTML = '<div class="sgroup-sub" style="color:var(--danger)">Enter your username first.</div>'; return; }
  listEl.innerHTML = '<div class="sgroup-sub">Looking up ' + escapeHtml(username) + '…</div>';
  try {
    const ur = await fetch('https://api.sleeper.app/v1/user/' + encodeURIComponent(username));
    if (!ur.ok) { listEl.innerHTML = '<div class="sgroup-sub" style="color:var(--danger)">Username not found.</div>'; return; }
    const user = await ur.json();
    if (!user || !user.user_id) { listEl.innerHTML = '<div class="sgroup-sub" style="color:var(--danger)">No user ID returned.</div>'; return; }
    state.sleeperUsername = user.username || username; persist();
    const season = new Date().getFullYear();
    let drafts = [];
    for (const s of [season, season - 1]) {
      const r = await fetch('https://api.sleeper.app/v1/user/' + user.user_id + '/drafts/nfl/' + s);
      if (r.ok) { const f = await r.json(); if (Array.isArray(f) && f.length) { drafts = f.map(d=>Object.assign({},d,{_s:s})); break; } }
    }
    if (!drafts.length) { listEl.innerHTML = '<div class="sgroup-sub" style="color:var(--warn)">No drafts found. Paste the URL below instead.</div>'; return; }
    listEl.innerHTML = drafts.map(d => {
      const name = (d.metadata && d.metadata.name) || ('Draft ' + d.draft_id.slice(-6));
      const teams = (d.settings && d.settings.teams) || '?';
      const rounds = (d.settings && d.settings.rounds) || '?';
      const status = (d.status||'').replace('_',' ');
      const color = d.status==='drafting'?'var(--accent)':d.status==='pre_draft'?'var(--info)':'var(--text-muted)';
      return '<button class="sh-act" style="flex-direction:column;align-items:flex-start;gap:3px" onclick="selectDraft(\'' + d.draft_id + '\')">' +
        '<span style="font-size:13px;font-weight:800">' + escapeHtml(name) + '</span>' +
        '<span style="font-size:9px;color:var(--text-muted)">' + teams + '-TM · ' + rounds + ' RD · <span style="color:' + color + ';font-weight:800">' + escapeHtml(status.toUpperCase()) + '</span> · ' + d._s + '</span></button>';
    }).join('');
  } catch (e) {
    listEl.innerHTML = '<div class="sgroup-sub" style="color:var(--danger)">Network error: ' + escapeHtml(e.message) + '</div>';
  }
}
function selectDraft(id) { document.getElementById('connId').value = id; doConnect(); }

function doConnect() {
  const uname = (document.getElementById('connUser')||{}).value ? document.getElementById('connUser').value.trim() : '';
  const id = parseDraftId((document.getElementById('connId')||{}).value || '');
  if (uname) { state.sleeperUsername = uname; persist(); }
  if (!id) { toast('No valid Draft ID. Use Find my drafts, or paste a URL.', 'danger'); return; }
  connectToSleeper(id);
}

async function connectToSleeper(draftId) {
  try {
    toast('Connecting to Sleeper…', 'info');
    const dr = await fetch('https://api.sleeper.app/v1/draft/' + draftId);
    if (!dr.ok) { toast(dr.status===404?'Draft not found — check the URL.':'Sleeper HTTP ' + dr.status, 'danger'); return false; }
    const info = await dr.json();

    // auto-detect structure
    const s = S();
    const dt = info.settings?.teams;
    const scoringMap = { ppr:'ppr', half_ppr:'half_ppr', standard:'standard' };
    const dsc = scoringMap[info.metadata?.scoring_type] || null;
    if (dt && dt >= 4 && dt <= 20) s.teams = dt;
    if (info.type === 'linear') s.draftType = 'linear'; else s.draftType = 'snake';
    if (dsc) s.scoring = dsc;
    if (info.settings && info.settings.reversal_round) s.thirdRoundReversal = info.settings.reversal_round >= 3;
    const rp = rosterFromSleeper(info.settings?.roster_positions || (info.metadata && info.metadata.roster_positions));
    if (rp) s.roster = rp;
    // rounds fallback if roster_positions absent
    if ((!rp || totalRounds() === 0) && info.settings?.rounds) {
      s.roster = Object.assign({}, s.roster); // keep, but ensure something
    }
    normalizeOrder();

    // your slot from username
    const username = state.sleeperUsername || '';
    let slot = s.yourSlot;
    if (username && info.draft_order) {
      try {
        const ur = await fetch('https://api.sleeper.app/v1/user/' + encodeURIComponent(username));
        if (ur.ok) { const u = await ur.json(); const sl = info.draft_order[u.user_id]; if (sl) slot = sl; }
      } catch (e) {}
    }
    s.yourSlot = clamp(slot, 1, s.teams);

    // team names from draft_order + slot_to_roster
    state.rosterIdToSlot = {};
    Object.entries(info.slot_to_roster_id || {}).forEach(([sl, rid]) => state.rosterIdToSlot[rid] = parseInt(sl));

    state.players = initPlayers();
    state.picks = [];
    state.mode = 'live';
    state.running = true;
    state.draftId = draftId;
    try { localStorage.setItem('ffdraft_last_draft_id', draftId); localStorage.setItem('ffdraft_last_draft_at', String(Date.now())); } catch(e){}

    closeSheet();
    document.getElementById('startOverlay').classList.add('hidden');
    await syncPicks();
    renderAll();
    toast('Connected · ' + s.teams + '-TM ' + totalRounds() + 'RD ' + scoringLabel(s.scoring) + ' · you at slot ' + s.yourSlot, 'success');

    state.pollIntervalMs = 1000;
    if (state.pollInterval) clearInterval(state.pollInterval);
    state.pollInterval = setInterval(syncPicks, state.pollIntervalMs);
    return true;
  } catch (e) {
    toast('Connect failed: ' + e.message, 'danger');
    return false;
  }
}

async function syncPicks() {
  if (!state.draftId || state.syncInFlight) return;
  state.syncInFlight = true;
  try {
    const res = await fetch('https://api.sleeper.app/v1/draft/' + state.draftId + '/picks');
    if (!res.ok) {
      if (res.status === 429) {
        toast('Sleeper rate-limited — slowing sync briefly.', 'warn');
        if (state.pollInterval) clearInterval(state.pollInterval);
        state.pollInterval = setInterval(syncPicks, 15000);
        setTimeout(() => { if (state.draftId && state.pollInterval) { clearInterval(state.pollInterval); state.pollInterval = setInterval(syncPicks, state.pollIntervalMs || 1000); } }, 60000);
      }
      return;
    }
    const picks = await res.json();
    const prior = state.picks.length;
    const nc = Array.isArray(picks) ? picks.length : 0;
    if (nc === prior) { state.lastSyncAt = Date.now(); return; }
    if (prior > 0 && nc < prior) { state.lastSyncAt = Date.now(); return; } // cache lag

    state.players.forEach(p => { p.drafted=false; p.draftedBy=null; p.draftedAt=null; });
    state.picks = [];
    picks.sort((a,b)=>a.pick_no-b.pick_no).forEach(pk => {
      const first = pk.metadata?.first_name||''; const last = pk.metadata?.last_name||'';
      const target = normalizeName((first+' '+last).trim());
      const tp = (pk.metadata?.position||'').toUpperCase(); const tt = (pk.metadata?.team||'').toUpperCase();
      let pl = null;
      if (target) {
        pl = state.players.find(p => normalizeName(p.name) === target);
        if (!pl && tp) pl = state.players.find(p => normalizeName(p.name)===target && p.pos===tp);
        if (!pl && last && tp && tt) { const ln = normalizeName(last); pl = state.players.find(p => { const parts=p.name.split(' '); return normalizeName(parts[parts.length-1])===ln && p.pos===tp && p.team===tt; }); }
      }
      if (pl) { pl.drafted=true; pl.draftedBy=pk.draft_slot; pl.draftedAt=pk.pick_no;
        state.picks.push({ pickNo:pk.pick_no, round:pk.round, teamSlot:pk.draft_slot, playerId:pl.id }); }
    });
    state.lastSyncAt = Date.now();
    renderAll();

    // advise: buzz when it becomes your turn
    if (isYourTurn() && state.onClockAlerted !== nextOpenPickNo()) {
      state.onClockAlerted = nextOpenPickNo();
      if (navigator.vibrate) navigator.vibrate([120,60,120]);
      const topQ = state.queue.map(id=>state.players.find(p=>p.id===id)).find(p=>p&&!p.drafted);
      const sugg = topQ || rankBPA()[0];
      if (sugg) toast('YOUR PICK — take ' + sugg.name + ' (' + sugg.pos + ')' + (topQ?' · queued':' · BPA') + ' in Sleeper', 'success');
    }
  } catch (e) { /* retry next poll */ }
  finally { state.syncInFlight = false; }
}

function disconnectSleeper(silent) {
  if (state.pollInterval) clearInterval(state.pollInterval);
  state.pollInterval = null;
  state.draftId = null;
  state.mode = 'idle'; state.running = false;
  try { localStorage.removeItem('ffdraft_last_draft_id'); localStorage.removeItem('ffdraft_last_draft_at'); } catch(e){}
  if (!silent) { renderAll(); toast('Disconnected from Sleeper.', 'info'); }
}

/* ============================================================
   INJURY FLAGS (opt-in, ~5MB)
   ============================================================ */
async function loadInjuries() {
  toast('Loading injury data…', 'info');
  try {
    let db = null;
    try { const c = JSON.parse(localStorage.getItem(SLEEPER_PLAYERS_CACHE_KEY)||'null'); if (c && Date.now()-c.ts < SLEEPER_PLAYERS_TTL_MS) db = c.data; } catch(e){}
    if (!db) {
      const res = await fetch('https://api.sleeper.app/v1/players/nfl');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const raw = await res.json();
      db = {};
      Object.values(raw).forEach(p => { if (p.full_name && p.injury_status) db[normalizeName(p.full_name)] = p.injury_status; });
      try { localStorage.setItem(SLEEPER_PLAYERS_CACHE_KEY, JSON.stringify({ ts:Date.now(), data:db })); } catch(e){}
    }
    let hits = 0;
    state.players.forEach(p => { const s = db[normalizeName(p.name)]; if (s) { p.injuryStatus = s; hits++; } });
    renderPlayers();
    toast(hits + ' injury flags applied.', hits?'success':'info');
  } catch (e) { toast('Injury load failed: ' + e.message, 'danger'); }
}

/* ============================================================
   TOAST
   ============================================================ */
let toastTimer = null;
function toast(msg, kind) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + (kind||'info');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.className = (kind||'info'); }, 3000);
}


/* ============================================================
   INIT + WIRING
   ============================================================ */
loadPersisted();
normalizeOrder();
state.players = initPlayers();
renderAll();
setPanel('players');

// search input
document.getElementById('searchInput').addEventListener('input', function () {
  state.search = this.value; renderPlayers();
});

// keep the "synced Xs ago" / clock fresh; also drives live sub text
setInterval(() => { if (state.mode === 'live' && state.running) renderTopbar(); }, 5000);

// screen wake lock during an active draft
let wakeLock = null;
async function requestWakeLock() { try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e){} }
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    if (wakeLock === null && state.running) requestWakeLock();
    if (state.mode === 'live' && state.draftId) syncPicks();
  }
});

// auto-reconnect to a live Sleeper draft within 24h
(function autoReconnect() {
  try {
    const id = localStorage.getItem('ffdraft_last_draft_id');
    const at = parseInt(localStorage.getItem('ffdraft_last_draft_at')||'0',10);
    if (id && at && Date.now()-at < 24*60*60*1000) {
      toast('Reconnecting to your last live draft…', 'info');
      connectToSleeper(id).then(ok => { if (ok) requestWakeLock(); });
    }
  } catch(e){}
})();

// service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
